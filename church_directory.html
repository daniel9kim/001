<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시흥교회 교인명단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3047;
    --accent: #c8a96e;
    --accent2: #e8d5a3;
    --text: #e8eaf0;
    --text2: #9aa0b4;
    --text3: #6b7390;
    --장로: #f0c060;
    --목사: #e87a5a;
    --안수집사: #7ec8e3;
    --권사: #c97ecb;
    --집사: #7bce9a;
    --성도: #8aa0c8;
    --전도사: #e3a87e;
    --사모: #e8a0b8;
    --명예권사: #a8b8d8;
    --other: #9090a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1020 0%, #1a1f35 50%, #0d1020 100%);
    border-bottom: 1px solid var(--accent);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .church-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .church-subtitle {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .header-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
  }
  .total-count {
    font-size: 13px;
    color: var(--text2);
  }
  .total-count strong {
    color: var(--accent2);
    font-size: 18px;
    font-weight: 700;
  }

  /* SEARCH BAR */
  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 380px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }
  #searchInput {
    width: 100%;
    padding: 9px 14px 9px 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }

  /* MAIN LAYOUT */
  .main-wrap {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 24px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* SIDEBAR FILTERS */
  .sidebar {
    position: sticky;
    top: 90px;
  }
  .filter-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .filter-title {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .filter-list {
    padding: 8px;
  }
  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 7px 10px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    font-weight: 500;
  }
  .filter-count {
    font-size: 11px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    color: var(--text3);
    min-width: 28px;
    text-align: center;
  }
  .filter-btn.active .filter-count {
    background: rgba(200,169,110,0.2);
    color: var(--accent);
  }

  /* GENDER FILTER */
  .gender-row {
    display: flex;
    gap: 6px;
    padding: 10px;
  }
  .gender-btn {
    flex: 1;
    padding: 7px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .gender-btn:hover { background: var(--surface2); }
  .gender-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    border-color: var(--accent);
    font-weight: 500;
  }

  /* CONTENT AREA */
  .content-area {}

  /* ACTIVE FILTERS */
  .active-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    min-height: 32px;
  }
  .filter-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 12px;
    background: rgba(200,169,110,0.12);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent2);
  }
  .filter-tag button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    opacity: 0.7;
  }
  .filter-tag button:hover { opacity: 1; }
  .result-info {
    font-size: 13px;
    color: var(--text3);
    margin-left: auto;
  }
  .result-info strong { color: var(--accent2); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead {
    background: linear-gradient(180deg, #1e2540 0%, var(--surface2) 100%);
    position: sticky;
    top: 88px;
  }
  th {
    padding: 12px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  th:hover { color: var(--accent2); }
  th.sorted { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid rgba(42,48,71,0.6);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(200,169,110,0.05); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; color: var(--text2); vertical-align: middle; }
  td.name-cell {
    font-weight: 600;
    color: var(--text);
    font-size: 14px;
    white-space: nowrap;
  }
  .관계-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    background: var(--surface2);
    color: var(--text3);
    vertical-align: middle;
  }

  /* JIKBUN BADGE */
  .jik-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .jik-장로 { background: rgba(240,192,96,0.15); color: var(--장로); border: 1px solid rgba(240,192,96,0.3); }
  .jik-목사 { background: rgba(232,122,90,0.15); color: var(--목사); border: 1px solid rgba(232,122,90,0.3); }
  .jik-안수집사 { background: rgba(126,200,227,0.15); color: var(--안수집사); border: 1px solid rgba(126,200,227,0.3); }
  .jik-권사 { background: rgba(201,126,203,0.15); color: var(--권사); border: 1px solid rgba(201,126,203,0.3); }
  .jik-집사 { background: rgba(123,206,154,0.15); color: var(--집사); border: 1px solid rgba(123,206,154,0.3); }
  .jik-성도 { background: rgba(138,160,200,0.15); color: var(--성도); border: 1px solid rgba(138,160,200,0.3); }
  .jik-전도사 { background: rgba(227,168,126,0.15); color: var(--전도사); border: 1px solid rgba(227,168,126,0.3); }
  .jik-사모 { background: rgba(232,160,184,0.15); color: var(--사모); border: 1px solid rgba(232,160,184,0.3); }
  .jik-명예권사 { background: rgba(168,184,216,0.15); color: var(--명예권사); border: 1px solid rgba(168,184,216,0.3); }
  .jik-other { background: rgba(144,144,160,0.15); color: var(--other); border: 1px solid rgba(144,144,160,0.3); }

  .family-cell {
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    color: var(--text3);
  }
  .phone-cell { white-space: nowrap; font-size: 12px; }
  .date-cell { white-space: nowrap; font-size: 12px; }
  .구역-cell { white-space: nowrap; font-size: 12px; }

  /* DETAIL MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 540px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .modal-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .modal-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 22px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px 24px; }
  .modal-section {
    margin-bottom: 20px;
  }
  .modal-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-field { }
  .modal-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 3px;
  }
  .modal-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .modal-value.empty { color: var(--text3); font-style: italic; font-weight: 400; font-size: 13px; }

  .family-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .family-member-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }
  .family-member-name { color: var(--text); font-weight: 500; }
  .family-member-jik { color: var(--text3); font-size: 11px; }

  /* PAGINATION */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 20px;
    border-top: 1px solid var(--border);
  }
  .page-btn {
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .page-btn.active { background: rgba(200,169,110,0.15); border-color: var(--accent); color: var(--accent2); font-weight: 600; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 8px; }

  /* MOBILE */
  @media (max-width: 900px) {
    .main-wrap { grid-template-columns: 1fr; padding: 16px; }
    .sidebar { position: static; }
    .header-inner { gap: 12px; }
    .church-title { font-size: 18px; }
    .search-wrap { max-width: 100%; }
    .header-divider { display: none; }
    thead { top: 0; }
  }
  @media (max-width: 640px) {
    .hide-mobile { display: none; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="church-title">✝ 시흥교회</div>
      <div class="church-subtitle">교인 명단 조회</div>
    </div>
    <div class="header-divider"></div>
    <div class="total-count">
      전체 <strong id="totalCount">-</strong>명
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="#9aa0b4" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="이름, 가족, 구역으로 검색..." />
    </div>
  </div>
</header>

<div class="main-wrap">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">교구 / 마을</div>
      <div class="filter-list" id="교구FilterList"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">직분</div>
      <div class="filter-list" id="직분FilterList"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">성별</div>
      <div class="gender-row">
        <button class="gender-btn active" data-gender="전체" onclick="setGender(this)">전체</button>
        <button class="gender-btn" data-gender="남" onclick="setGender(this)">남</button>
        <button class="gender-btn" data-gender="여" onclick="setGender(this)">여</button>
      </div>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="content-area">
    <div class="active-filters" id="activeFilters">
      <span class="result-info"><strong id="resultCount">-</strong>명 표시 중</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('이름')">이름 <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('직분')">직분 <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('나이')" class="hide-mobile">나이 <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('교구')">교구 <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('구역')" class="hide-mobile">구역 <span class="sort-icon">↕</span></th>
            <th class="hide-mobile">연락처</th>
            <th class="hide-mobile">가족</th>
            <th onclick="sortBy('등록일')" class="hide-mobile">등록일 <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================================

// STATE
// ============================================================
let filtered = [...MEMBERS];
let currentPage = 1;
const PAGE_SIZE = 50;
let sortCol = '이름';
let sortDir = 1;
let filters = { 교구: null, 직분: null, 성별: '전체' };
let searchQuery = '';

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('totalCount').textContent = MEMBERS.length.toLocaleString();
  buildSidebarFilters();
  applyFilters();

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    currentPage = 1;
    applyFilters();
  });
});

// ============================================================
// FILTER BUILDING
// ============================================================
function buildSidebarFilters() {
  const 교구Map = {};
  const 직분Map = {};
  MEMBERS.forEach(m => {
    if (m.교구) 교구Map[m.교구] = (교구Map[m.교구] || 0) + 1;
    if (m.직분) 직분Map[m.직분] = (직분Map[m.직분] || 0) + 1;
  });

  const gyoguOrder = ['사랑마을','양선마을','온유마을','인내마을','자비마을','절제마을','충성마을','화평마을','희락마을','청년부','1교구','2교구','3교구','4교구'];
  const jikbunOrder = ['장로','목사','사모','안수집사','전도사','권사','명예권사','권사(타)','집사','성도','장로(타)'];

  const 교구List = document.getElementById('교구FilterList');
  gyoguOrder.filter(k => 교구Map[k]).forEach(k => {
    교구List.appendChild(makeFilterBtn(k, 교구Map[k], '교구'));
  });
  교구List.appendChild(makeFilterBtn('전체', MEMBERS.length, '교구', true));

  const 직분List = document.getElementById('직분FilterList');
  jikbunOrder.filter(k => 직분Map[k]).forEach(k => {
    직분List.appendChild(makeFilterBtn(k, 직분Map[k], '직분'));
  });
  직분List.appendChild(makeFilterBtn('전체', MEMBERS.length, '직분', true));
}

function makeFilterBtn(label, count, type, isAll = false) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (isAll && !filters[type] ? ' active' : (!isAll && filters[type] === label ? ' active' : ''));
  btn.innerHTML = `<span>${label}</span><span class="filter-count">${count.toLocaleString()}</span>`;
  btn.onclick = () => {
    filters[type] = isAll ? null : (filters[type] === label ? null : label);
    refreshFilterBtns();
    currentPage = 1;
    applyFilters();
  };
  btn.dataset.label = label;
  btn.dataset.type = type;
  return btn;
}

function refreshFilterBtns() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const type = btn.dataset.type;
    const label = btn.dataset.label;
    if (label === '전체') {
      btn.classList.toggle('active', !filters[type]);
    } else {
      btn.classList.toggle('active', filters[type] === label);
    }
  });
}

function setGender(btn) {
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filters.성별 = btn.dataset.gender;
  currentPage = 1;
  applyFilters();
}

// ============================================================
// FILTER + SEARCH + SORT
// ============================================================
function applyFilters() {
  filtered = MEMBERS.filter(m => {
    if (filters.교구 && m.교구 !== filters.교구) return false;
    if (filters.직분 && m.직분 !== filters.직분) return false;
    if (filters.성별 !== '전체' && m.성별 !== filters.성별) return false;
    if (searchQuery) {
      const hay = [m.이름, m.가족전체, m.구역, m.교구, m.직분, m.핸드폰, m.전화번호].join(' ').toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    let av = a[sortCol] ?? '';
    let bv = b[sortCol] ?? '';
    if (sortCol === '나이') { av = Number(av) || 0; bv = Number(bv) || 0; }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  document.getElementById('resultCount').textContent = filtered.length.toLocaleString();
  renderActiveFilters();
  renderTable();
  renderPagination();
}

function renderActiveFilters() {
  const container = document.getElementById('activeFilters');
  container.innerHTML = '';
  if (filters.교구) container.appendChild(makeTag(filters.교구, () => { filters.교구 = null; refreshFilterBtns(); currentPage=1; applyFilters(); }));
  if (filters.직분) container.appendChild(makeTag(filters.직분, () => { filters.직분 = null; refreshFilterBtns(); currentPage=1; applyFilters(); }));
  if (filters.성별 !== '전체') container.appendChild(makeTag(filters.성별 + '성', () => { filters.성별='전체'; document.querySelector('.gender-btn[data-gender="전체"]').click(); }));
  if (searchQuery) container.appendChild(makeTag(`"${searchQuery}"`, () => { document.getElementById('searchInput').value=''; searchQuery=''; currentPage=1; applyFilters(); }));
  const info = document.createElement('span');
  info.className = 'result-info';
  info.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong>명 표시 중`;
  container.appendChild(info);
}

function makeTag(label, onRemove) {
  const tag = document.createElement('div');
  tag.className = 'filter-tag';
  tag.innerHTML = `<span>${label}</span><button>×</button>`;
  tag.querySelector('button').onclick = onRemove;
  return tag;
}

// ============================================================
// TABLE RENDER
// ============================================================
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  if (page.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div><h3>검색 결과가 없습니다</h3><p>다른 검색어나 필터를 시도해 보세요</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = page.map(m => {
    const jikClass = getJikClass(m.직분);
    const phone = m.핸드폰 || m.전화번호 || '';
    const regDate = formatDate(m.등록일);
    return `<tr onclick="showDetail(${m.ID})">
      <td class="name-cell">${m.이름}<span class="관계-badge">${m.관계 || ''}</span></td>
      <td><span class="jik-badge ${jikClass}">${m.직분 || '-'}</span></td>
      <td class="hide-mobile">${m.나이 || '-'}</td>
      <td>${m.교구 || '-'}</td>
      <td class="구역-cell hide-mobile">${m.구역 || '-'}</td>
      <td class="phone-cell hide-mobile">${phone || '<span style="color:var(--text3)">-</span>'}</td>
      <td class="family-cell hide-mobile" title="${m.가족전체 || ''}">${m.가족전체 || '-'}</td>
      <td class="date-cell hide-mobile">${regDate || '-'}</td>
    </tr>`;
  }).join('');

  // Update sort indicators
  document.querySelectorAll('th').forEach(th => {
    const col = th.getAttribute('onclick')?.match(/sortBy\('(.+)'\)/)?.[1];
    th.classList.toggle('sorted', col === sortCol);
  });
}

// ============================================================
// PAGINATION
// ============================================================
function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= total; i++) {
    if (total > 10 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== total) {
      if (i === currentPage - 3 || i === currentPage + 3) html += '<span style="color:var(--text3);padding:0 4px">…</span>';
      continue;
    }
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (n < 1 || n > total) return;
  currentPage = n;
  renderTable();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// SORT
// ============================================================
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  applyFilters();
}

// ============================================================
// DETAIL MODAL
// ============================================================
function showDetail(id) {
  const m = MEMBERS.find(x => x.ID == id);
  if (!m) return;

  document.getElementById('modalName').textContent = m.이름;

  const jikClass = getJikClass(m.직분);
  let metaHtml = `<span class="jik-badge ${jikClass}">${m.직분 || '-'}</span>`;
  if (m.성별) metaHtml += `<span class="jik-badge jik-other">${m.성별}성</span>`;
  if (m.나이) metaHtml += `<span class="jik-badge jik-other">${m.나이}세</span>`;
  if (m.세례) metaHtml += `<span class="jik-badge jik-other">${m.세례}</span>`;
  document.getElementById('modalMeta').innerHTML = metaHtml;

  let bodyHtml = '';

  // 소속
  bodyHtml += `<div class="modal-section">
    <div class="modal-section-title">소속</div>
    <div class="modal-grid">
      ${field('교구', m.교구)}
      ${field('구역', m.구역)}
      ${field('직분', m.직분)}
      ${field('세부직분', m.세부직분 !== m.직분 ? m.세부직분 : '')}
    </div>
  </div>`;

  // 가족관계
  const familyHtml = parseFamilyList(m.가족전체, m.이름);
  bodyHtml += `<div class="modal-section">
    <div class="modal-section-title">가족 구성원</div>
    ${familyHtml}
  </div>`;

  // 배우자
  if (m.배우자) {
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title">배우자</div>
      <div class="modal-grid">
        ${field('배우자 이름', m.배우자)}
        ${field('배우자 직분', m.배우자직분)}
      </div>
    </div>`;
  }

  // 개인정보
  bodyHtml += `<div class="modal-section">
    <div class="modal-section-title">개인 정보</div>
    <div class="modal-grid">
      ${field('핸드폰', m.핸드폰)}
      ${field('전화번호', m.전화번호)}
      ${field('관계', m.관계)}
      ${field('세대주', m.세대주 !== m.이름 ? m.세대주 : '본인')}
      ${field('교인구분', m.교인구분1)}
      ${field('현재상태', m.현재상태)}
    </div>
  </div>`;

  // 등록 정보
  bodyHtml += `<div class="modal-section">
    <div class="modal-section-title">등록 정보</div>
    <div class="modal-grid">
      ${field('등록일', formatDate(m.등록일))}
      ${field('교인번호', m.ID)}
    </div>
  </div>`;

  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalBg').classList.add('open');
}

function field(label, value) {
  const isEmpty = !value || value === '0' || value === 'NaT';
  return `<div class="modal-field">
    <div class="modal-label">${label}</div>
    <div class="modal-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '정보 없음' : value}</div>
  </div>`;
}

function parseFamilyList(raw, selfName) {
  if (!raw) return '<p style="color:var(--text3);font-size:13px">정보 없음</p>';
  // Format: "이름(직분) 이름2(직분2)"
  const parts = raw.trim().split(/\s+/);
  const tags = parts.map(p => {
    const m = p.match(/^(.+)\((.+)\)$/);
    if (m) {
      const isSelf = m[1] === selfName;
      return `<div class="family-member-tag">
        <span class="family-member-name" style="${isSelf ? 'color:var(--accent2)' : ''}">${m[1]}</span>
        <span class="family-member-jik">${m[2]}</span>
      </div>`;
    }
    return `<div class="family-member-tag"><span class="family-member-name">${p}</span></div>`;
  }).join('');
  return `<div class="family-list">${tags}</div>`;
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalBg').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ============================================================
// HELPERS
// ============================================================
function getJikClass(jik) {
  const map = { '장로':'jik-장로', '목사':'jik-목사', '사모':'jik-사모', '안수집사':'jik-안수집사', '권사':'jik-권사', '명예권사':'jik-명예권사', '집사':'jik-집사', '성도':'jik-성도', '전도사':'jik-전도사' };
  return map[jik] || 'jik-other';
}

function formatDate(d) {
  if (!d || d === 'NaT' || d === 'nan') return '';
  const s = String(d);
  if (s.match(/^\d{8}$/)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  if (s.length >= 10) return s.slice(0, 10);
  return s;
}
