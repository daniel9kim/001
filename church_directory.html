<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시흥교회 교인명단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3047;
    --accent: #c8a96e;
    --accent2: #e8d5a3;
    --text: #e8eaf0;
    --text2: #9aa0b4;
    --text3: #6b7390;
    --장로: #f0c060;
    --목사: #e87a5a;
    --안수집사: #7ec8e3;
    --권사: #c97ecb;
    --집사: #7bce9a;
    --성도: #8aa0c8;
    --전도사: #e3a87e;
    --사모: #e8a0b8;
    --명예권사: #a8b8d8;
    --other: #9090a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1020 0%, #1a1f35 50%, #0d1020 100%);
    border-bottom: 1px solid var(--accent);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .church-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .church-subtitle {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .header-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
  }
  .total-count {
    font-size: 13px;
    color: var(--text2);
  }
  .total-count strong {
    color: var(--accent2);
    font-size: 18px;
    font-weight: 700;
  }

  /* SEARCH BAR */
  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 380px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }
  #searchInput {
    width: 100%;
    padding: 9px 14px 9px 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }

  /* MAIN LAYOUT */
  .main-wrap {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 24px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* SIDEBAR FILTERS */
  .sidebar {
    position: sticky;
    top: 90px;
  }
  .filter-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .filter-title {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .filter-list {
    padding: 8px;
  }
  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 7px 10px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    font-weight: 500;
  }
  .filter-btn span:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .filter-count {
    font-size: 11px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    color: var(--text3);
    min-width: 28px;
    text-align: center;
  }
  .filter-btn.active .filter-count {
    background: rgba(200,169,110,0.2);
    color: var(--accent);
  }

  /* GENDER FILTER */
  .gender-row {
    display: flex;
    gap: 6px;
    padding: 10px;
  }
  .gender-btn {
    flex: 1;
    padding: 7px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .gender-btn:hover { background: var(--surface2); }
  .gender-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    border-color: var(--accent);
    font-weight: 500;
  }

  /* CONTENT AREA */
  .content-area {}

  /* ACTIVE FILTERS */
  .active-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    min-height: 32px;
  }
  .filter-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 12px;
    background: rgba(200,169,110,0.12);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent2);
  }
  .filter-tag button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    opacity: 0.7;
  }
  .filter-tag button:hover { opacity: 1; }
  .result-info {
    font-size: 13px;
    color: var(--text3);
    margin-left: auto;
  }
  .result-info strong { color: var(--accent2); }

  /* TABLE */
  .table-wrap {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    max-height: calc(100vh - 220px);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 20;
  }
  th {
    position: sticky;
    top: 0;
    z-index: 21;
    padding: 12px 14px;
    text-align: left;
    vertical-align: middle;
    line-height: 1.2;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
    background: linear-gradient(180deg, #1e2540 0%, var(--surface2) 100%);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(0,0,0,0.18);
  }
  th:hover { color: var(--accent2); }
  th.sorted { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid rgba(42,48,71,0.6);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(200,169,110,0.05); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; color: var(--text2); vertical-align: middle; }
  td.name-cell {
    font-weight: 600;
    color: var(--text);
    font-size: 14px;
    white-space: nowrap;
  }
  .관계-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    background: var(--surface2);
    color: var(--text3);
    vertical-align: middle;
  }

  /* JIKBUN BADGE */
  .jik-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .jik-badge.is-clickable {
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .jik-badge.is-clickable:hover {
    transform: translateY(-1px);
    opacity: 0.92;
  }
  .jik-장로 { background: rgba(240,192,96,0.15); color: var(--장로); border: 1px solid rgba(240,192,96,0.3); }
  .jik-목사 { background: rgba(232,122,90,0.15); color: var(--목사); border: 1px solid rgba(232,122,90,0.3); }
  .jik-안수집사 { background: rgba(126,200,227,0.15); color: var(--안수집사); border: 1px solid rgba(126,200,227,0.3); }
  .jik-권사 { background: rgba(201,126,203,0.15); color: var(--권사); border: 1px solid rgba(201,126,203,0.3); }
  .jik-집사 { background: rgba(123,206,154,0.15); color: var(--집사); border: 1px solid rgba(123,206,154,0.3); }
  .jik-성도 { background: rgba(138,160,200,0.15); color: var(--성도); border: 1px solid rgba(138,160,200,0.3); }
  .jik-전도사 { background: rgba(227,168,126,0.15); color: var(--전도사); border: 1px solid rgba(227,168,126,0.3); }
  .jik-사모 { background: rgba(232,160,184,0.15); color: var(--사모); border: 1px solid rgba(232,160,184,0.3); }
  .jik-명예권사 { background: rgba(168,184,216,0.15); color: var(--명예권사); border: 1px solid rgba(168,184,216,0.3); }
  .jik-other { background: rgba(144,144,160,0.15); color: var(--other); border: 1px solid rgba(144,144,160,0.3); }

  .family-cell {
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    color: var(--text3);
  }
  .phone-cell { white-space: nowrap; font-size: 12px; }
  .date-cell { white-space: nowrap; font-size: 12px; }
  .구역-cell { white-space: nowrap; font-size: 12px; }

  /* DETAIL MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 540px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .modal-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .modal-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 22px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px 24px; }
  .modal-section {
    margin-bottom: 20px;
  }
  .modal-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-field { }
  .modal-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 3px;
  }
  .modal-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .modal-value.empty { color: var(--text3); font-style: italic; font-weight: 400; font-size: 13px; }

  .family-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .family-member-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }
  .family-member-tag.is-link {
    cursor: pointer;
    transition: all 0.15s;
  }
  .family-member-tag.is-link:hover {
    border-color: var(--accent);
    background: rgba(200,169,110,0.10);
  }
  .family-member-name { color: var(--text); font-weight: 500; }
  .family-member-jik { color: var(--text3); font-size: 11px; }

  /* PAGINATION */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 20px;
    border-top: 1px solid var(--border);
  }
  .page-btn {
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .page-btn.active { background: rgba(200,169,110,0.15); border-color: var(--accent); color: var(--accent2); font-weight: 600; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 8px; }

  .mobile-card-cell {
    padding: 0 !important;
    border: none;
    background: transparent;
  }
  .mobile-card {
    margin: 10px;
    padding: 14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid rgba(200,169,110,0.12);
    border-radius: 14px;
  }
  .mobile-card-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .mobile-card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
  }
  .mobile-card-sub {
    margin-top: 4px;
    font-size: 12px;
    color: var(--text3);
  }
  .mobile-card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 10px;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .mobile-card-meta span {
    padding: 3px 8px;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 999px;
  }
  .mobile-card-family {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.5;
  }


  #jsonPickerWrap button:hover { border-color: var(--accent); color: var(--accent2); }

  /* MOBILE */
  @media (max-width: 900px) {
    .main-wrap { grid-template-columns: 1fr; padding: 14px; gap: 16px; }
    .sidebar {
      position: static;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .filter-section { margin-bottom: 0; }
    .header-inner { gap: 10px; }
    .church-title { font-size: 18px; }
    .search-wrap { max-width: 100%; min-width: 100%; }
    .header-divider { display: none; }
    thead { top: 0; }
  }
  @media (max-width: 640px) {
    body { background: #0d1018; }
    header {
      position: static;
      padding: 18px 16px 16px;
    }
    .main-wrap { padding: 12px; }
    .filter-title { padding: 10px 12px; }
    .filter-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px;
      scroll-snap-type: x proximity;
    }
    .filter-btn {
      width: auto;
      min-width: max-content;
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      scroll-snap-align: start;
    }
    .gender-row { padding: 10px; }
    .active-filters { gap: 6px; margin-bottom: 12px; }
    .result-info { width: 100%; margin-left: 0; }
    .table-wrap {
      background: transparent;
      border: none;
      overflow: visible;
    }
    table { border-collapse: separate; border-spacing: 0; }
    thead { display: none; }
    tbody tr { border-bottom: none; }
    .hide-mobile { display: none !important; }
    .pagination {
      padding: 14px 6px 6px;
      border-top: none;
      gap: 4px;
      flex-wrap: wrap;
    }
    .page-btn { min-width: 36px; padding: 7px 10px; }
    .modal {
      width: calc(100vw - 20px);
      max-height: 88vh;
      border-radius: 14px;
    }
    .modal-header, .modal-body { padding-left: 16px; padding-right: 16px; }
    .modal-name { font-size: 22px; }
    .modal-grid { grid-template-columns: 1fr; }
  }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="church-title">✝ 시흥교회</div>
      <div class="church-subtitle">교인 명단 조회</div>
    </div>
    <div class="header-divider"></div>
    <div class="total-count">
      전체 <strong id="totalCount">-</strong>명
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="#9aa0b4" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="이름, 가족, 구역으로 검색..." />
    </div>
  </div>
</header>

<div class="main-wrap">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">소속 구분</div>
      <div class="gender-row" id="소속구분FilterRow">
        <button class="gender-btn active affiliation-type-btn" data-affiliation-type="전체">전체</button>
        <button class="gender-btn affiliation-type-btn" data-affiliation-type="마을">마을</button>
        <button class="gender-btn affiliation-type-btn" data-affiliation-type="교구">교구</button>
        <button class="gender-btn affiliation-type-btn" data-affiliation-type="부서">부서</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title">교구 / 마을</div>
      <div class="filter-list" id="교구FilterList"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">직분</div>
      <div class="filter-list" id="직분FilterList"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">성별</div>
      <div class="gender-row">
        <button class="gender-btn active" data-gender="전체">전체</button>
        <button class="gender-btn" data-gender="남">남</button>
        <button class="gender-btn" data-gender="여">여</button>
      </div>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="content-area">
    <div class="active-filters" id="activeFilters">
      <span class="result-info"><strong id="resultCount">-</strong>명 표시 중</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="이름">이름 <span class="sort-icon">↕</span></th>
            <th data-sort="직분">직분 <span class="sort-icon">↕</span></th>
            <th data-sort="나이" class="hide-mobile">나이 <span class="sort-icon">↕</span></th>
            <th data-sort="현재상태">현재상태 <span class="sort-icon">↕</span></th>
            <th data-sort="구역" class="hide-mobile">구역 <span class="sort-icon">↕</span></th>
            <th class="hide-mobile">연락처</th>
            <th class="hide-mobile">가족</th>
            <th data-sort="등록일" class="hide-mobile">등록일 <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>


<script>
(() => {
  const MEMBERS_JSON_URL = './church_members.json';
  const PAGE_SIZE = 50;
  const ROLE_ORDER = ['장로','목사','사모','안수집사','전도사','권사','집사','성도','기타'];

  const state = {
    members: [],
    filtered: [],
    currentPage: 1,
    sortCol: '이름',
    sortDir: 1,
    searchQuery: '',
    filters: {
      소속구분: '전체',
      교구: null,
      직분: null,
      성별: '전체',
      세례: null
    }
  };

  const els = {};

  function $(id) { return document.getElementById(id); }

  function normalizeText(value) {
    return String(value ?? '').trim().replace(/\s+/g, ' ');
  }

  function normalizeRole(member) {
    const raw = `${member?.직분 || ''} ${member?.세부직분 || ''}`.trim();
    if (!raw) return '기타';
    if (raw.includes('장로')) return '장로';
    if (raw.includes('목사')) return '목사';
    if (raw.includes('사모')) return '사모';
    if (raw.includes('안수집사')) return '안수집사';
    if (raw.includes('전도사')) return '전도사';
    if (raw.includes('권사')) return '권사';
    if (raw.includes('집사')) return '집사';
    if (raw.includes('성도')) return '성도';
    return '기타';
  }

  function roleSortIndex(role) {
    const idx = ROLE_ORDER.indexOf(role);
    return idx === -1 ? ROLE_ORDER.length : idx;
  }

  function getRoleBadgeLabel(member) {
    const normalized = normalizeRole(member);
    return normalized === '기타' ? (member?.직분 || member?.세부직분 || '기타') : normalized;
  }

  function detectGroupType(value) {
    const label = normalizeText(value);
    if (!label) return '부서';
    if (label.endsWith('마을')) return '마을';
    if (label.includes('교구')) return '교구';
    return '부서';
  }

  function formatDate(v) {
    const s = normalizeText(v);
    if (!s || s === '0' || s === 'NaT') return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
    return s;
  }


  function getBirthDisplay(member) {
    const birth = formatDate(member?.생년월일 || member?.생일 || member?.출생일 || member?.생년월일8자리 || '');
    return birth || '데이터 없음';
  }

  function getJikClass(roleLabel) {
    const role = normalizeText(roleLabel);
    if (role.includes('장로')) return 'jik-장로';
    if (role.includes('목사')) return 'jik-목사';
    if (role.includes('사모')) return 'jik-사모';
    if (role.includes('안수집사')) return 'jik-안수집사';
    if (role.includes('전도사')) return 'jik-전도사';
    if (role.includes('권사')) return role.includes('명예') ? 'jik-명예권사' : 'jik-권사';
    if (role.includes('집사')) return 'jik-집사';
    if (role.includes('성도')) return 'jik-성도';
    return 'jik-other';
  }

  function findFamilyMemberByName(name, familyText) {
    const targetName = normalizeText(name);
    const targetFamily = normalizeText(familyText);
    if (!targetName) return null;
    const candidates = state.members.filter(m => normalizeText(m.이름) === targetName);
    if (!candidates.length) return null;
    if (candidates.length === 1) return candidates[0];
    const sameFamily = candidates.find(m => normalizeText(m.가족전체) === targetFamily);
    if (sameFamily) return sameFamily;
    return candidates[0];
  }

  function parseFamilyList(member) {
    const raw = normalizeText(member && member.가족전체);
    const selfName = normalizeText(member && member.이름);
    if (!raw) return '<div class="modal-value empty">가족 정보 없음</div>';
    const parts = raw.split(/\s+/).filter(Boolean);
    const html = parts.map(part => {
      const m = part.match(/^(.+?)(?:\((.+?)\))?$/);
      const name = m ? m[1] : part;
      const jik = m && m[2] ? m[2] : '';
      const isSelf = name === selfName;
      const linkedMember = findFamilyMemberByName(name, member.가족전체);
      const clickable = linkedMember && linkedMember.ID;
      return `<span class="family-member-tag${clickable ? ' is-link' : ''}"${clickable ? ` data-family-member-id="${linkedMember.ID}"` : ''}><span class="family-member-name">${name}${isSelf ? ' (본인)' : ''}</span>${jik ? `<span class="family-member-jik">${jik}</span>` : ''}</span>`;
    }).join('');
    return `<div class="family-list">${html}</div>`;
  }

  function field(label, value) {
    const text = normalizeText(value);
    const isEmpty = !text || text === '0' || text === 'NaT';
    return `<div class="modal-field"><div class="modal-label">${label}</div><div class="modal-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '-' : text}</div></div>`;
  }

  function isMobileView() {
    return window.innerWidth <= 640;
  }

  function showNotice(message, isError = false) {
    let notice = $('dataLoadNotice');
    if (!notice) {
      notice = document.createElement('div');
      notice.id = 'dataLoadNotice';
      notice.style.margin = '0 0 16px';
      notice.style.padding = '12px 14px';
      notice.style.borderRadius = '10px';
      notice.style.fontSize = '13px';
      notice.style.lineHeight = '1.6';
      const area = document.querySelector('.content-area');
      area.insertBefore(notice, $('activeFilters'));
    }
    notice.style.display = 'block';
    notice.style.border = '1px solid ' + (isError ? 'rgba(232,122,90,0.35)' : 'rgba(200,169,110,0.25)');
    notice.style.background = isError ? 'rgba(232,122,90,0.10)' : 'rgba(200,169,110,0.08)';
    notice.style.color = isError ? '#ffcabd' : 'var(--accent2)';
    notice.innerHTML = message;
  }

  function hideNotice() {
    const notice = $('dataLoadNotice');
    if (notice) notice.style.display = 'none';
  }

  function renderAffiliationTypeButtons(stats) {
    document.querySelectorAll('.affiliation-type-btn').forEach(btn => {
      const type = btn.dataset.affiliationType || '전체';
      const s = stats[type] || { groupCount: 0 };
      btn.textContent = type === '전체' ? `전체 (${s.groupCount})` : `${type} (${s.groupCount})`;
      btn.classList.toggle('active', state.filters.소속구분 === type);
    });
  }

  function makeFilterBtn({label, count, type, value, isAll = false, active = false}) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-btn' + (active ? ' active' : '');
    btn.dataset.type = type;
    btn.dataset.value = value == null ? '' : String(value);
    btn.dataset.all = isAll ? 'true' : 'false';
    btn.innerHTML = `<span>${label}</span><span class="filter-count">${count.toLocaleString()}</span>`;
    return btn;
  }

  function buildFilters() {
    const groupCounts = new Map();
    const roleCounts = new Map();
    const typeStats = {
      '전체': { groupCount: 0 },
      '마을': { groupCount: 0 },
      '교구': { groupCount: 0 },
      '부서': { groupCount: 0 }
    };

    state.members.forEach(member => {
      const group = normalizeText(member.교구);
      if (group) {
        groupCounts.set(group, (groupCounts.get(group) || 0) + 1);
      }
      const role = normalizeRole(member);
      roleCounts.set(role, (roleCounts.get(role) || 0) + 1);
    });

    for (const [group] of groupCounts.entries()) {
      const type = detectGroupType(group);
      typeStats[type].groupCount += 1;
      typeStats['전체'].groupCount += 1;
    }

    renderAffiliationTypeButtons(typeStats);

    const selectedType = state.filters.소속구분;
    const visibleGroups = [...groupCounts.entries()]
      .filter(([group]) => selectedType === '전체' || detectGroupType(group) === selectedType)
      .sort((a, b) => a[0].localeCompare(b[0], 'ko'));

    const groupList = $('교구FilterList');
    groupList.innerHTML = '';
    const allCount = selectedType === '전체'
      ? visibleGroups.length
      : visibleGroups.reduce((sum, [, count]) => sum + count, 0);
    const allLabel = selectedType === '전체' ? `전체 (${visibleGroups.length}개)` : `전체 (${allCount}명)`;
    groupList.appendChild(makeFilterBtn({
      label: allLabel,
      count: allCount || state.members.length,
      type: '교구',
      value: '',
      isAll: true,
      active: !state.filters.교구
    }));
    for (const [group, count] of visibleGroups) {
      groupList.appendChild(makeFilterBtn({
        label: group,
        count,
        type: '교구',
        value: group,
        active: normalizeText(state.filters.교구) === group
      }));
    }

    const roleList = $('직분FilterList');
    roleList.innerHTML = '';
    roleList.appendChild(makeFilterBtn({
      label: '전체',
      count: state.members.length,
      type: '직분',
      value: '',
      isAll: true,
      active: !state.filters.직분
    }));
    ROLE_ORDER.forEach(role => {
      const count = roleCounts.get(role);
      if (!count) return;
      roleList.appendChild(makeFilterBtn({
        label: role,
        count,
        type: '직분',
        value: role,
        active: state.filters.직분 === role
      }));
    });

    document.querySelectorAll('.gender-btn[data-gender]').forEach(btn => {
      btn.classList.toggle('active', (btn.dataset.gender || '전체') === state.filters.성별);
    });
  }

  function applyFilters() {
    const q = state.searchQuery;
    state.filtered = state.members.filter(member => {
      const group = normalizeText(member.교구);
      const groupType = detectGroupType(group);
      if (state.filters.소속구분 !== '전체' && groupType !== state.filters.소속구분) return false;
      if (state.filters.교구 && group !== normalizeText(state.filters.교구)) return false;
      if (state.filters.직분 && normalizeRole(member) !== state.filters.직분) return false;
      if (state.filters.성별 !== '전체' && normalizeText(member.성별) !== state.filters.성별) return false;
      if (state.filters.세례 && normalizeText(member.세례) !== state.filters.세례) return false;
      if (q) {
        const hay = [member.이름, member.가족전체, member.구역, member.교구, member.직분, member.세부직분, member.핸드폰, member.전화번호]
          .map(normalizeText)
          .join(' ')
          .toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    const dir = state.sortDir;
    const col = state.sortCol;
    state.filtered.sort((a, b) => {
      let av, bv;
      if (col === '직분') {
        av = roleSortIndex(normalizeRole(a));
        bv = roleSortIndex(normalizeRole(b));
        if (av !== bv) return (av - bv) * dir;
        av = normalizeText(a.이름);
        bv = normalizeText(b.이름);
      } else if (col === '나이') {
        av = Number(a[col] || 0);
        bv = Number(b[col] || 0);
      } else if (col === '등록일') {
        av = formatDate(a[col]);
        bv = formatDate(b[col]);
      } else {
        av = normalizeText(a[col]);
        bv = normalizeText(b[col]);
      }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return 0;
    });

    const totalPages = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
    if (state.currentPage > totalPages) state.currentPage = 1;
  }

  function renderActiveFilters() {
    const container = $('activeFilters');
    container.innerHTML = '';
    const tags = [];
    if (state.filters.소속구분 !== '전체') tags.push(['소속:' + state.filters.소속구분, () => { state.filters.소속구분 = '전체'; state.filters.교구 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.교구) tags.push([state.filters.교구, () => { state.filters.교구 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.직분) tags.push([state.filters.직분, () => { state.filters.직분 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.성별 !== '전체') tags.push([state.filters.성별 + '성', () => { state.filters.성별 = '전체'; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.세례) tags.push([state.filters.세례, () => { state.filters.세례 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.searchQuery) tags.push([`"${state.searchQuery}"`, () => { state.searchQuery = ''; els.searchInput.value=''; rerender({resetPage:true}); }]);

    for (const [label, onRemove] of tags) {
      const tag = document.createElement('div');
      tag.className = 'filter-tag';
      tag.innerHTML = `<span>${label}</span><button type="button">×</button>`;
      tag.querySelector('button').addEventListener('click', onRemove);
      container.appendChild(tag);
    }
    const info = document.createElement('span');
    info.className = 'result-info';
    info.innerHTML = `<strong>${state.filtered.length.toLocaleString()}</strong>명 표시 중`;
    container.appendChild(info);
  }

  function renderTable() {
    const tbody = els.tableBody;
    const start = (state.currentPage - 1) * PAGE_SIZE;
    const page = state.filtered.slice(start, start + PAGE_SIZE);

    if (!page.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div><h3>검색 결과가 없습니다</h3><p>다른 검색어나 필터를 시도해 보세요</p></div></td></tr>`;
      return;
    }

    if (isMobileView()) {
      tbody.innerHTML = page.map(m => {
        const roleLabel = getRoleBadgeLabel(m);
        return `<tr data-member-id="${m.ID}"><td colspan="8" class="mobile-card-cell"><div class="mobile-card"><div class="mobile-card-top"><div><div class="mobile-card-name">${normalizeText(m.이름)}${m.관계 ? `<span class="관계-badge">${normalizeText(m.관계)}</span>` : ''}</div><div class="mobile-card-sub">${normalizeText(m.현재상태) || '상태 미지정'} · ${normalizeText(m.구역) || '구역 미지정'}</div></div><span class="jik-badge ${getJikClass(roleLabel)}">${roleLabel}</span></div><div class="mobile-card-meta"><span>${normalizeText(m.성별) || '-'}${m.나이 ? ` · ${m.나이}세` : ''}</span><span>${normalizeText(m.핸드폰 || m.전화번호) || '연락처 없음'}</span><span>${formatDate(m.등록일) || '등록일 없음'}</span></div><div class="mobile-card-family">${normalizeText(m.가족전체) || '가족 정보 없음'}</div></div></td></tr>`;
      }).join('');
    } else {
      tbody.innerHTML = page.map(m => {
        const roleLabel = getRoleBadgeLabel(m);
        return `<tr data-member-id="${m.ID}"><td class="name-cell">${normalizeText(m.이름)}${m.관계 ? `<span class="관계-badge">${normalizeText(m.관계)}</span>` : ''}</td><td><span class="jik-badge ${getJikClass(roleLabel)}">${roleLabel}</span></td><td class="hide-mobile">${m.나이 || '-'}</td><td>${normalizeText(m.현재상태) || '-'}</td><td class="구역-cell hide-mobile">${normalizeText(m.구역) || '-'}</td><td class="phone-cell hide-mobile">${normalizeText(m.핸드폰 || m.전화번호) || '<span style="color:var(--text3)">-</span>'}</td><td class="family-cell hide-mobile" title="${normalizeText(m.가족전체)}">${normalizeText(m.가족전체) || '-'}</td><td class="date-cell hide-mobile">${formatDate(m.등록일) || '-'}</td></tr>`;
      }).join('');
    }

    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.classList.toggle('sorted', th.dataset.sort === state.sortCol);
    });
  }

  function renderPagination() {
    const total = Math.ceil(state.filtered.length / PAGE_SIZE);
    const pg = els.pagination;
    if (total <= 1) { pg.innerHTML = ''; return; }
    let html = `<button type="button" class="page-btn" data-page="${state.currentPage - 1}" ${state.currentPage === 1 ? 'disabled' : ''}>‹</button>`;
    for (let i = 1; i <= total; i++) {
      if (total > 9 && i !== 1 && i !== total && Math.abs(i - state.currentPage) > 1) {
        if (i === 2 || i === total - 1 || i === state.currentPage - 2 || i === state.currentPage + 2) {
          html += '<span style="color:var(--text3);padding:0 4px">…</span>';
        }
        continue;
      }
      html += `<button type="button" class="page-btn ${i === state.currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }
    html += `<button type="button" class="page-btn" data-page="${state.currentPage + 1}" ${state.currentPage === total ? 'disabled' : ''}>›</button>`;
    pg.innerHTML = html;
  }

  function rerender({ rebuildFilters = false, resetPage = false } = {}) {
    if (resetPage) state.currentPage = 1;
    if (rebuildFilters) buildFilters();
    applyFilters();
    renderActiveFilters();
    renderTable();
    renderPagination();
    $('totalCount').textContent = state.members.length.toLocaleString();
    $('resultCount').textContent = state.filtered.length.toLocaleString();
  }

  function applyBadgeFilter(type, value) {
    const normalizedValue = normalizeText(value);
    if (!normalizedValue) return;

    if (type === '직분') {
      state.filters.직분 = normalizedValue;
    } else if (type === '성별') {
      state.filters.성별 = normalizedValue;
    } else if (type === '세례') {
      state.filters.세례 = normalizedValue;
    } else {
      return;
    }

    state.currentPage = 1;
    $('modalBg').classList.remove('open');
    rerender({ rebuildFilters: true, resetPage: true });
  }

  function makeMetaBadge(label, className, filterType = '', filterValue = '') {
    const safeLabel = normalizeText(label);
    const clickable = filterType && normalizeText(filterValue);
    return `<span class="jik-badge ${className}${clickable ? ' is-clickable' : ''}"${clickable ? ` data-badge-filter-type="${filterType}" data-badge-filter-value="${normalizeText(filterValue)}"` : ''}>${safeLabel || '-'}</span>`;
  }


  function showDetail(id) {
    const m = state.members.find(x => String(x.ID) === String(id));
    if (!m) return;
    $('modalName').textContent = normalizeText(m.이름);
    const roleLabel = getRoleBadgeLabel(m);
    let metaHtml = makeMetaBadge(roleLabel || '-', getJikClass(roleLabel), '직분', roleLabel);
    if (m.성별) metaHtml += makeMetaBadge(`${normalizeText(m.성별)}성`, 'jik-other', '성별', normalizeText(m.성별));
    if (m.나이) metaHtml += makeMetaBadge(`${m.나이}세`, 'jik-other');
    if (m.세례) metaHtml += makeMetaBadge(normalizeText(m.세례), 'jik-other', '세례', normalizeText(m.세례));
    $('modalMeta').innerHTML = metaHtml;

    let bodyHtml = '';
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">소속</div><div class="modal-grid">${field('교구', m.교구)}${field('구역', m.구역)}${field('직분', m.직분)}${field('세부직분', m.세부직분 !== m.직분 ? m.세부직분 : '')}</div></div>`;
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">가족 구성원</div>${parseFamilyList(m)}</div>`;
    if (m.배우자) bodyHtml += `<div class="modal-section"><div class="modal-section-title">배우자</div><div class="modal-grid">${field('배우자 이름', m.배우자)}${field('배우자 직분', m.배우자직분)}</div></div>`;
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">개인 정보</div><div class="modal-grid">${field('생년월일', getBirthDisplay(m))}${field('관계', m.관계)}${field('세대주', m.세대주 !== m.이름 ? m.세대주 : '본인')}${field('교인구분', m.교인구분1)}${field('현재상태', m.현재상태)}</div></div>`;
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">등록 정보</div><div class="modal-grid">${field('등록일', formatDate(m.등록일))}${field('휴대폰', normalizeText(m.핸드폰 || m.전화번호) || '데이터 없음')}</div></div>`;
    $('modalBody').innerHTML = bodyHtml;
    $('modalBg').classList.add('open');
  }

  window.closeModalDirect = function() {
    $('modalBg').classList.remove('open');
  };
  window.closeModal = function(event) {
    if (!event || event.target === $('modalBg')) $('modalBg').classList.remove('open');
  };

  function bindEvents() {
    els.searchInput.addEventListener('input', (e) => {
      state.searchQuery = normalizeText(e.target.value).toLowerCase();
      rerender({ resetPage: true });
    });

    $('소속구분FilterRow').addEventListener('click', (e) => {
      const btn = e.target.closest('.affiliation-type-btn');
      if (!btn) return;
      const nextType = btn.dataset.affiliationType || '전체';
      state.filters.소속구분 = nextType;
      if (state.filters.교구 && nextType !== '전체' && detectGroupType(state.filters.교구) !== nextType) {
        state.filters.교구 = null;
      }
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('교구FilterList').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      const isAll = btn.dataset.all === 'true';
      const value = normalizeText(btn.dataset.value);
      state.filters.교구 = isAll ? null : value;
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('직분FilterList').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      const isAll = btn.dataset.all === 'true';
      state.filters.직분 = isAll ? null : normalizeText(btn.dataset.value);
      rerender({ rebuildFilters: true, resetPage: true });
    });

    document.querySelector('.filter-section:last-child .gender-row').addEventListener('click', (e) => {
      const btn = e.target.closest('.gender-btn[data-gender]');
      if (!btn) return;
      state.filters.성별 = btn.dataset.gender || '전체';
      rerender({ rebuildFilters: true, resetPage: true });
    });

    document.querySelector('thead').addEventListener('click', (e) => {
      const th = e.target.closest('th[data-sort]');
      if (!th) return;
      const col = th.dataset.sort;
      if (state.sortCol === col) state.sortDir *= -1;
      else { state.sortCol = col; state.sortDir = 1; }
      rerender();
    });

    els.tableBody.addEventListener('click', (e) => {
      const row = e.target.closest('tr[data-member-id]');
      if (row) showDetail(row.dataset.memberId);
    });

    els.pagination.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-page]');
      if (!btn || btn.disabled) return;
      const total = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
      const next = Number(btn.dataset.page || 1);
      if (next < 1 || next > total) return;
      state.currentPage = next;
      renderTable();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    $('modalMeta').addEventListener('click', (e) => {
      const badge = e.target.closest('[data-badge-filter-type]');
      if (!badge) return;
      applyBadgeFilter(badge.dataset.badgeFilterType, badge.dataset.badgeFilterValue);
    });
    $('modalBody').addEventListener('click', (e) => {
      const familyTag = e.target.closest('[data-family-member-id]');
      if (!familyTag) return;
      showDetail(familyTag.dataset.familyMemberId);
    });


    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => rerender(), 80);
    });
  }

  function setupFilePicker() {
    const searchWrap = document.querySelector('.search-wrap');
    const wrap = document.createElement('div');
    wrap.id = 'jsonPickerWrap';
    wrap.style.display = 'flex';
    wrap.style.alignItems = 'center';
    wrap.style.gap = '8px';
    wrap.style.flexWrap = 'wrap';
    const button = document.createElement('button');
    button.type = 'button';
    button.textContent = 'JSON 파일 열기';
    button.style.padding = '9px 12px';
    button.style.borderRadius = '8px';
    button.style.border = '1px solid var(--border)';
    button.style.background = 'var(--surface2)';
    button.style.color = 'var(--text2)';
    button.style.fontSize = '13px';
    button.style.cursor = 'pointer';
    button.style.fontFamily = "'Noto Sans KR', sans-serif";
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.style.display = 'none';
    button.addEventListener('click', () => input.click());
    input.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!Array.isArray(data)) throw new Error('JSON 형식 오류');
        state.members = data;
        hideNotice();
        buildFilters();
        rerender({ rebuildFilters: true, resetPage: true });
      } catch (err) {
        showNotice('선택한 JSON 파일을 읽지 못했습니다. <strong>church_members.json</strong> 파일인지 확인해 주세요.', true);
      } finally {
        input.value = '';
      }
    });
    wrap.appendChild(button);
    wrap.appendChild(input);
    searchWrap.parentNode.insertBefore(wrap, searchWrap.nextSibling);
  }

  async function loadData() {
    try {
      const response = await fetch(MEMBERS_JSON_URL, { cache: 'no-store' });
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const data = await response.json();
      if (!Array.isArray(data)) throw new Error('JSON 형식 오류');
      state.members = data;
      hideNotice();
      buildFilters();
      rerender({ rebuildFilters: true, resetPage: true });
    } catch (err) {
      showNotice('같은 폴더의 <strong>church_members.json</strong> 파일을 자동으로 읽지 못했습니다.<br>브라우저에서 HTML 파일을 직접 열면(file://) 보안 정책 때문에 JSON 자동 로드가 막힐 수 있습니다.<br>아래 <strong>JSON 파일 열기</strong> 버튼으로 <strong>church_members.json</strong> 파일을 직접 선택해 주세요.', true);
    }
  }

  function init() {
    els.searchInput = $('searchInput');
    els.tableBody = $('tableBody');
    els.pagination = $('pagination');
    setupFilePicker();
    bindEvents();
    loadData();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
