<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시흥교회 교인명단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3047;
    --accent: #c8a96e;
    --accent2: #e8d5a3;
    --text: #e8eaf0;
    --text2: #9aa0b4;
    --text3: #6b7390;
    --장로: #f0c060;
    --목사: #e87a5a;
    --안수집사: #7ec8e3;
    --권사: #c97ecb;
    --집사: #7bce9a;
    --성도: #8aa0c8;
    --전도사: #e3a87e;
    --사모: #e8a0b8;
    --명예권사: #a8b8d8;
    --other: #9090a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1020 0%, #1a1f35 50%, #0d1020 100%);
    border-bottom: 1px solid var(--accent);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .church-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .church-subtitle {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .header-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
  }
  .total-count {
    font-size: 13px;
    color: var(--text2);
  }
  .total-count strong {
    color: var(--accent2);
    font-size: 18px;
    font-weight: 700;
  }

  /* SEARCH BAR */
  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 380px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }
  #searchInput {
    width: 100%;
    padding: 9px 14px 9px 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }

  /* MAIN LAYOUT */
  .main-wrap {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 24px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* SIDEBAR FILTERS */
  .sidebar {
    position: sticky;
    top: 90px;
  }
  .filter-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .filter-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .filter-title-text {
    display: inline-flex;
    align-items: center;
    min-width: 0;
  }
  .inline-all-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: none;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .inline-all-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }
  .inline-all-btn.active {
    background: rgba(200,169,110,0.12);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .filter-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
    padding: 10px;
  }
  .filter-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 58px;
    padding: 8px 6px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    gap: 4px;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    font-weight: 500;
  }
  .filter-btn span:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .filter-count {
    font-size: 11px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    color: var(--text3);
    min-width: 28px;
    text-align: center;
  }
  .filter-btn.active .filter-count {
    background: rgba(200,169,110,0.2);
    color: var(--accent);
  }

  /* GENDER FILTER */
  .gender-row {
    display: flex;
    gap: 6px;
    padding: 10px;
  }
  .gender-btn {
    flex: 1;
    padding: 7px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .gender-btn:hover { background: var(--surface2); }
  .gender-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    border-color: var(--accent);
    font-weight: 500;
  }
  .gender-btn.is-top,
  .age-btn.is-top {
    box-shadow: inset 0 0 0 1px rgba(232,213,163,0.18);
  }
  .filter-btn-main {
    display: block;
    font-weight: 600;
    line-height: 1.2;
  }
  .filter-btn-sub {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: var(--text3);
    line-height: 1.2;
  }
  .gender-btn.active .filter-btn-sub,
  .age-btn.active .filter-btn-sub {
    color: var(--accent);
  }

  .age-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
  }
  .age-btn {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .age-btn:hover { background: var(--surface2); }
  .age-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    border-color: var(--accent);
    font-weight: 500;
  }

  /* CONTENT AREA */
  .content-area {}

  /* ACTIVE FILTERS */
  .active-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    min-height: 32px;
  }
  .filter-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 12px;
    background: rgba(200,169,110,0.12);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent2);
  }
  .filter-tag button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    opacity: 0.7;
  }
  .filter-tag button:hover { opacity: 1; }
  .result-info {
    font-size: 13px;
    color: var(--text3);
    margin-left: auto;
  }
  .result-info strong { color: var(--accent2); }

  /* TABLE */
  .table-wrap {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    max-height: calc(100vh - 220px);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 20;
  }
  th {
    position: sticky;
    top: 0;
    z-index: 21;
    padding: 12px 14px;
    text-align: left;
    vertical-align: middle;
    line-height: 1.2;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
    background: linear-gradient(180deg, #1e2540 0%, var(--surface2) 100%);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(0,0,0,0.18);
  }
  th:hover { color: var(--accent2); }
  th.sorted { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid rgba(42,48,71,0.6);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(200,169,110,0.05); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; color: var(--text2); vertical-align: middle; }
  td.name-cell {
    font-weight: 600;
    color: var(--text);
    font-size: 14px;
    white-space: nowrap;
  }
  .관계-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    background: var(--surface2);
    color: var(--text3);
    vertical-align: middle;
  }

  /* JIKBUN BADGE */
  .jik-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .jik-badge.is-clickable {
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .jik-badge.is-clickable:hover {
    transform: translateY(-1px);
    opacity: 0.92;
  }
  .modal-meta .jik-badge {
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .modal-meta .jik-badge.is-clickable {
    position: relative;
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .modal-meta .jik-badge.is-clickable.is-active {
    color: #fff7e3;
    border-color: rgba(232,213,163,0.78) !important;
    box-shadow: 0 0 0 2px rgba(200,169,110,0.24), 0 10px 22px rgba(0,0,0,0.26), inset 0 1px 0 rgba(255,255,255,0.14);
    filter: brightness(1.12) saturate(1.08);
  }
  .modal-meta .jik-badge.is-clickable.is-active::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(232,213,163,0.18), rgba(255,255,255,0.02));
    pointer-events: none;
  }
  .modal-meta .jik-badge.is-clickable > span {
    position: relative;
    z-index: 1;
  }
  .modal-meta .jik-badge.is-clickable:hover {
    transform: translateY(-1px);
    opacity: 1;
    filter: brightness(1.08);
  }
  .modal-meta [data-badge-filter-type="성별"] {
    background: rgba(126,200,227,0.18);
    color: #d8f5ff;
    border: 1px solid rgba(126,200,227,0.45);
  }
  .modal-meta [data-badge-filter-type="세례"] {
    background: rgba(123,206,154,0.18);
    color: #dff9e8;
    border: 1px solid rgba(123,206,154,0.42);
  }
  .modal-meta [data-badge-filter-type="현재상태"] {
    box-shadow: 0 6px 18px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .modal-meta [data-badge-filter-type="성별"].is-active {
    background: linear-gradient(135deg, rgba(126,200,227,0.34), rgba(126,200,227,0.18));
    color: #f4fcff;
  }
  .modal-meta [data-badge-filter-type="세례"].is-active {
    background: linear-gradient(135deg, rgba(123,206,154,0.34), rgba(123,206,154,0.18));
    color: #f4fff7;
  }
  .modal-meta [data-badge-filter-type="현재상태"].is-active {
    background: linear-gradient(135deg, rgba(200,169,110,0.36), rgba(200,169,110,0.18));
    color: #fff7e8;
  }
  .modal-meta [data-badge-filter-type="직분"].is-active {
    box-shadow: 0 0 0 2px rgba(200,169,110,0.24), 0 10px 22px rgba(0,0,0,0.26), inset 0 1px 0 rgba(255,255,255,0.14);
  }
  .jik-장로 { background: rgba(240,192,96,0.15); color: var(--장로); border: 1px solid rgba(240,192,96,0.3); }
  .jik-목사 { background: rgba(232,122,90,0.15); color: var(--목사); border: 1px solid rgba(232,122,90,0.3); }
  .jik-안수집사 { background: rgba(126,200,227,0.15); color: var(--안수집사); border: 1px solid rgba(126,200,227,0.3); }
  .jik-권사 { background: rgba(201,126,203,0.15); color: var(--권사); border: 1px solid rgba(201,126,203,0.3); }
  .jik-집사 { background: rgba(123,206,154,0.15); color: var(--집사); border: 1px solid rgba(123,206,154,0.3); }
  .jik-성도 { background: rgba(138,160,200,0.15); color: var(--성도); border: 1px solid rgba(138,160,200,0.3); }
  .jik-전도사 { background: rgba(227,168,126,0.15); color: var(--전도사); border: 1px solid rgba(227,168,126,0.3); }
  .jik-사모 { background: rgba(232,160,184,0.15); color: var(--사모); border: 1px solid rgba(232,160,184,0.3); }
  .jik-명예권사 { background: rgba(168,184,216,0.15); color: var(--명예권사); border: 1px solid rgba(168,184,216,0.3); }
  .jik-other { background: rgba(144,144,160,0.15); color: var(--other); border: 1px solid rgba(144,144,160,0.3); }

  .value-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    border: 1px solid color-mix(in srgb, var(--badge-color, var(--accent)) 34%, transparent);
    background: color-mix(in srgb, var(--badge-color, var(--accent)) 15%, transparent);
    color: var(--badge-color, var(--accent2));
  }
  .value-badge.is-clickable {
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .value-badge.is-clickable:hover {
    transform: translateY(-1px);
    opacity: 0.94;
  }
  .modal-value .value-badge {
    min-height: 28px;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .modal-value .value-badge.is-clickable {
    box-shadow: 0 6px 18px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .modal-value .value-badge.is-clickable.is-active {
    color: #fff7e3;
    border-color: rgba(232,213,163,0.78) !important;
    box-shadow: 0 0 0 2px rgba(200,169,110,0.22), 0 10px 22px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.14);
    filter: brightness(1.12) saturate(1.08);
  }
  .modal-value .value-badge.is-clickable:hover {
    opacity: 1;
    filter: brightness(1.08);
  }
  .family-cell {
    max-width: 320px;
    font-size: 12px;
    color: var(--text3);
  }
  .family-inline-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 8px;
    align-items: center;
  }
  .family-inline-name {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--text3);
    max-width: 100%;
  }
  .family-inline-name.is-link {
    color: var(--accent2);
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
  }
  .family-inline-name.is-link:hover {
    color: var(--accent);
    text-decoration: underline;
  }
  .family-inline-jik {
    color: var(--text3);
    font-size: 11px;
  }
  .phone-cell { white-space: nowrap; font-size: 12px; }
  .date-cell { white-space: nowrap; font-size: 12px; }
  .구역-cell { white-space: nowrap; font-size: 12px; }

  /* DETAIL MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 540px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    background: linear-gradient(180deg, rgba(200,169,110,0.10) 0%, rgba(255,255,255,0.02) 100%);
  }
  .modal-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .modal-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 22px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px 24px; }
  .modal-section {
    margin-bottom: 16px;
    padding: 14px 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid rgba(200,169,110,0.14);
    border-radius: 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  }
  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    padding-left: 10px;
    border-bottom: 1px solid rgba(200,169,110,0.20);
    position: relative;
  }
  .modal-section-title::before {
    content: '';
    position: absolute;
    left: 0;
    top: 1px;
    bottom: 9px;
    width: 3px;
    border-radius: 999px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-field {
    padding: 10px 12px;
    background: rgba(15,17,23,0.35);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
  }
  .modal-label {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 5px;
  }
  .modal-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
    line-height: 1.5;
  }
  .modal-value.empty { color: var(--text3); font-style: italic; font-weight: 400; font-size: 13px; }

  .family-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .family-member-tag {
    display: inline-flex;
    align-items: center;

      구역: null,
      세부직분: null
    }
  };

  const els = {};

  function $(id) { return document.getElementById(id); }

  function normalizeText(value) {
    return String(value ?? '').trim().replace(/\s+/g, ' ');
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeRole(member) {
    const raw = `${member?.직분 || ''} ${member?.세부직분 || ''}`.trim();
    if (!raw) return '기타';
    if (raw.includes('장로')) return '장로';
    if (raw.includes('목사')) return '목사';
    if (raw.includes('사모')) return '사모';
    if (raw.includes('안수집사')) return '안수집사';
    if (raw.includes('전도사')) return '전도사';
    if (raw.includes('권사')) return '권사';
    if (raw.includes('집사')) return '집사';
    if (raw.includes('성도')) return '성도';
    return '기타';
  }

  function roleSortIndex(role) {
    const idx = ROLE_ORDER.indexOf(role);
    return idx === -1 ? ROLE_ORDER.length : idx;
  }

  function getRoleBadgeLabel(member) {
    const normalized = normalizeRole(member);
    return normalized === '기타' ? (member?.직분 || member?.세부직분 || '기타') : normalized;
  }

  function detectGroupType(value) {
    const label = normalizeText(value);
    if (!label) return '부서';
    if (label.endsWith('마을')) return '마을';
    if (label.includes('교구')) return '교구';
    return '부서';
  }


  function getVillageFilterValue(member) {
    const village = normalizeText(member?.교구);
    return village && village.endsWith('마을') ? village : '기타';
  }

  function formatDate(v) {
    const s = normalizeText(v);
    if (!s || s === '0' || s === 'NaT' || s === 'null' || s === 'undefined') return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (/^\d{4}[./]\d{2}[./]\d{2}$/.test(s)) return s.replace(/[.]/g, '-').replace(/\//g, '-');
    if (/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
    if (/^\d{6}$/.test(s)) return s;
    if (/^\d{5}$/.test(s)) {
      const excelEpoch = new Date(Date.UTC(1899, 11, 30));
      const date = new Date(excelEpoch.getTime() + Number(s) * 86400000);
      const yyyy = date.getUTCFullYear();
      const mm = String(date.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(date.getUTCDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }
    return s;
  }



  function getAgeGroup(member) {
    const age = Number(member?.나이 || 0);
    if (!Number.isFinite(age) || age <= 0) return '';
    const decade = Math.floor(age / 10) * 10;
    return `${decade}대`;
  }

  function getBirthDisplay(member) {
    if (!member || typeof member !== 'object') return '데이터 없음';

    const preferredKeys = [
      '생년월일', '생년월일8자리', '생년월일 8자리', '출생일', '생일',
      'Birth', 'birth', 'birthday', 'Birthday', 'DOB', 'dob'
    ];

    for (const key of preferredKeys) {
      const birth = formatDate(member[key]);
      if (birth) return birth;
    }

    const dynamicKey = Object.keys(member).find((key) => /생년|출생|생일|birth|birthday|dob/i.test(String(key)));
    if (dynamicKey) {
      const birth = formatDate(member[dynamicKey]);
      if (birth) return birth;
    }

    const nestedCandidates = [member.추가정보, member.상세정보, member.개인정보, member.profile, member.meta];
    for (const nested of nestedCandidates) {
      if (!nested || typeof nested !== 'object') continue;
      const nestedKey = Object.keys(nested).find((key) => /생년|출생|생일|birth|birthday|dob/i.test(String(key)));
      if (!nestedKey) continue;
      const birth = formatDate(nested[nestedKey]);
      if (birth) return birth;
    }

    return '데이터 없음';
  }

  function getJikClass(roleLabel) {
    const role = normalizeText(roleLabel);
    if (role.includes('장로')) return 'jik-장로';
    if (role.includes('목사')) return 'jik-목사';
    if (role.includes('사모')) return 'jik-사모';
    if (role.includes('안수집사')) return 'jik-안수집사';
    if (role.includes('전도사')) return 'jik-전도사';
    if (role.includes('권사')) return role.includes('명예') ? 'jik-명예권사' : 'jik-권사';
    if (role.includes('집사')) return 'jik-집사';
    if (role.includes('성도')) return 'jik-성도';
    return 'jik-other';
  }

  function getBadgeColor(label, type = 'default') {
    const normalized = normalizeText(label) || '미기재';
    const presetStatus = {
      '출석': '#7bce9a',
      '미출석': '#e3a87e',
      '장기결석': '#e87a5a',
      '새가족': '#7ec8e3',
      '등록': '#8aa0c8',
      '이명': '#c97ecb',
      '전출': '#a8b8d8'
    };
    if (type === 'status' && presetStatus[normalized]) return presetStatus[normalized];

    let hash = 0;
    const seed = `${type}:${normalized}`;
    for (let i = 0; i < seed.length; i += 1) {
      hash = ((hash << 5) - hash) + seed.charCodeAt(i);
      hash |= 0;
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue} 62% 68%)`;
  }

  function makeValueBadge(label, type = 'default', clickable = false, extraAttrs = '') {
    const safeLabel = normalizeText(label) || '-';
    const color = getBadgeColor(safeLabel, type);
    return `<span class="value-badge${clickable ? ' is-clickable' : ''}" style="--badge-color:${color};" ${extraAttrs}>${escapeHtml(safeLabel)}</span>`;
  }

  function isBadgeFilterActive(type, value) {
    const normalizedValue = normalizeText(value);
    if (!normalizedValue) return false;
    if (type === '직분') return normalizeText(state.filters.직분) === normalizeRole({ 직분: normalizedValue, 세부직분: normalizedValue });
    if (type === '성별') return state.filters.성별 === normalizedValue;
    if (type === '세례') return normalizeText(state.filters.세례) === normalizedValue;
    if (type === '현재상태') return normalizeText(state.filters.현재상태) === normalizedValue;
    if (type === '교구') return normalizeText(state.filters.교구) === normalizedValue;
    if (type === '구역') return normalizeText(state.filters.구역) === normalizedValue;
    if (type === '세부직분') return normalizeText(state.filters.세부직분) === normalizedValue;
    return false;
  }

  function makeDetailFilterBadge(label, type = 'default', filterType = '', filterValue = '') {
    const safeLabel = normalizeText(label);
    const safeFilterValue = normalizeText(filterValue);
    const clickable = filterType && safeFilterValue;
    const active = clickable && isBadgeFilterActive(filterType, safeFilterValue);
    const attrs = clickable
      ? ` data-badge-filter-type="${escapeHtml(filterType)}" data-badge-filter-value="${escapeHtml(safeFilterValue)}"`
      : '';
    return makeValueBadge(safeLabel || '-', type, clickable, `${attrs}${active ? ' data-badge-active="true"' : ''} `).replace('value-badge', `value-badge${active ? ' is-active' : ''}`);
  }

  function renderDetailLookupField(label, displayValue, options = {}) {
    const safeLabel = normalizeText(label);
    const safeDisplayValue = normalizeText(displayValue);
    const filterType = options.filterType || '';
    const filterValue = normalizeText(options.filterValue ?? safeDisplayValue);
    const badgeType = options.badgeType || 'default';
    const isEmpty = !safeDisplayValue || safeDisplayValue === '0' || safeDisplayValue === 'NaT';
    if (isEmpty) return field(safeLabel, safeDisplayValue);
    if (!filterType || !filterValue) return field(safeLabel, safeDisplayValue);
    return fieldHtml(safeLabel, makeDetailFilterBadge(safeDisplayValue, badgeType, filterType, filterValue));
  }

  function renderFamilyInline(member) {
    const raw = normalizeText(member && member.가족전체);
    const selfName = normalizeText(member && member.이름);
    if (!raw) return '<span style="color:var(--text3)">-</span>';
    const parts = raw.split(/\s+/).filter(Boolean);
    return `<div class="family-inline-list">${parts.map(part => {
      const m = part.match(/^(.+?)(?:\((.+?)\))?$/);
      const name = normalizeText(m ? m[1] : part);
      const jik = normalizeText(m && m[2] ? m[2] : '');
      const linkedMember = findFamilyMemberByName(name, member.가족전체);
      const clickable = linkedMember && linkedMember.ID && name !== selfName;
      const attrs = clickable ? ` data-family-member-id="${escapeHtml(linkedMember.ID)}"` : '';
      return `<span class="family-inline-name${clickable ? ' is-link' : ''}"${attrs}>${escapeHtml(name)}${jik ? `<span class="family-inline-jik">(${escapeHtml(jik)})</span>` : ''}</span>`;
    }).join('')}</div>`;
  }

  function findFamilyMemberByName(name, familyText) {
    const targetName = normalizeText(name);
    const targetFamily = normalizeText(familyText);
    if (!targetName) return null;
    const candidates = state.members.filter(m => normalizeText(m.이름) === targetName);
    if (!candidates.length) return null;
    if (candidates.length === 1) return candidates[0];
    const sameFamily = candidates.find(m => normalizeText(m.가족전체) === targetFamily);
    if (sameFamily) return sameFamily;
    return candidates[0];
  }

  function parseFamilyList(member) {
    const raw = normalizeText(member && member.가족전체);
    const selfName = normalizeText(member && member.이름);
    if (!raw) return '<div class="modal-value empty">가족 정보 없음</div>';
    const parts = raw.split(/\s+/).filter(Boolean);
    const html = parts.map(part => {
      const m = part.match(/^(.+?)(?:\((.+?)\))?$/);
      const name = m ? m[1] : part;
      const jik = m && m[2] ? m[2] : '';
      const isSelf = name === selfName;
      const linkedMember = findFamilyMemberByName(name, member.가족전체);
      const clickable = linkedMember && linkedMember.ID;
      return `<span class="family-member-tag${clickable ? ' is-link' : ''}"${clickable ? ` data-family-member-id="${linkedMember.ID}"` : ''}><span class="family-member-name">${name}${isSelf ? ' (본인)' : ''}</span>${jik ? `<span class="family-member-jik">${jik}</span>` : ''}</span>`;
    }).join('');
    return `<div class="family-list">${html}</div>`;
  }

  function field(label, value) {
    const text = normalizeText(value);
    const isEmpty = !text || text === '0' || text === 'NaT';
    return `<div class="modal-field"><div class="modal-label">${label}</div><div class="modal-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '-' : escapeHtml(text)}</div></div>`;
  }

  function fieldHtml(label, html, isEmpty = false) {
    return `<div class="modal-field"><div class="modal-label">${escapeHtml(label)}</div><div class="modal-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '-' : html}</div></div>`;
  }

  function isMobileView() {
    return window.innerWidth <= 640;
  }

  function showNotice(message, isError = false) {
    let notice = $('dataLoadNotice');
    if (!notice) {
      notice = document.createElement('div');
      notice.id = 'dataLoadNotice';
      notice.style.margin = '0 0 16px';
      notice.style.padding = '12px 14px';
      notice.style.borderRadius = '10px';
      notice.style.fontSize = '13px';
      notice.style.lineHeight = '1.6';
      const area = document.querySelector('.content-area');
      area.insertBefore(notice, $('activeFilters'));
    }
    notice.style.display = 'block';
    notice.style.border = '1px solid ' + (isError ? 'rgba(232,122,90,0.35)' : 'rgba(200,169,110,0.25)');
    notice.style.background = isError ? 'rgba(232,122,90,0.10)' : 'rgba(200,169,110,0.08)';
    notice.style.color = isError ? '#ffcabd' : 'var(--accent2)';
    notice.innerHTML = message;
  }

  function hideNotice() {
    const notice = $('dataLoadNotice');
    if (notice) notice.style.display = 'none';
  }

  function makeFilterBtn({label, count, type, value, isAll = false, active = false}) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-btn' + (active ? ' active' : '');
    btn.dataset.type = type;
    btn.dataset.value = value == null ? '' : String(value);
    btn.dataset.all = isAll ? 'true' : 'false';
    btn.innerHTML = `<span>${label}</span><span class="filter-count">${count.toLocaleString()}</span>`;
    return btn;
  }


  function getVisibleMembersForMenuCounts() {
    return Array.isArray(state.filtered) && state.filtered.length ? state.filtered : state.members;
  }

  function updateInlineAllButton(id, isActive, count) {
    const btn = $(id);
    if (!btn) return;
    btn.textContent = `전체 ${count.toLocaleString()}명`;
    btn.classList.toggle('active', isActive);
    btn.title = `전체 ${count.toLocaleString()}명`;
  }

  function updateGenderButtons() {
    const visible = getVisibleMembersForMenuCounts();
    const counts = new Map([['남', 0], ['여', 0]]);
    visible.forEach(member => {
      const gender = normalizeText(member.성별);
      if (counts.has(gender)) counts.set(gender, counts.get(gender) + 1);
    });
    const total = visible.length || 0;
    const maxCount = Math.max(0, ...counts.values());

    updateInlineAllButton('genderAllBtn', state.filters.성별 === '전체', total);

    document.querySelectorAll('.gender-row .gender-btn[data-gender]').forEach(btn => {
      const gender = btn.dataset.gender || '전체';
      const count = counts.get(gender) || 0;
      btn.innerHTML = `<span class="filter-btn-main">${gender}</span><span class="filter-btn-sub">${count.toLocaleString()}명</span>`;
      btn.classList.toggle('active', gender === state.filters.성별);
      btn.classList.toggle('is-top', count > 0 && count === maxCount);
      btn.title = `${gender} ${count.toLocaleString()}명`;
    });
  }

  function updateAgeButtons() {
    const groups = ['10대','20대','30대','40대','50대','60대','70대','80대','90대'];
    const visible = getVisibleMembersForMenuCounts();
    const counts = new Map(groups.map(group => [group, 0]));
    visible.forEach(member => {
      const group = getAgeGroup(member);
      if (counts.has(group)) counts.set(group, counts.get(group) + 1);
    });
    const total = visible.length || 0;
    const maxCount = Math.max(0, ...counts.values());

    updateInlineAllButton('ageAllBtn', state.filters.세대 === '전체', total);

    document.querySelectorAll('.age-row .age-btn[data-age-group]').forEach(btn => {
      const ageGroup = btn.dataset.ageGroup || '전체';
      const count = counts.get(ageGroup) || 0;
      btn.innerHTML = `<span class="filter-btn-main">${ageGroup}</span><span class="filter-btn-sub">${count.toLocaleString()}명</span>`;
      btn.classList.toggle('active', ageGroup === state.filters.세대);
      btn.classList.toggle('is-top', count > 0 && count === maxCount);
      btn.title = `${ageGroup} ${count.toLocaleString()}명`;
    });
  }

  function buildFilters() {
    const villageCounts = new Map();
    const roleCounts = new Map();
    const statusCounts = new Map();

    state.members.forEach(member => {
      const village = getVillageFilterValue(member);
      villageCounts.set(village, (villageCounts.get(village) || 0) + 1);
      const role = normalizeRole(member);
      roleCounts.set(role, (roleCounts.get(role) || 0) + 1);

      const status = normalizeText(member.현재상태);
      if (status) statusCounts.set(status, (statusCounts.get(status) || 0) + 1);
    });

    const villages = [...villageCounts.entries()].sort((a, b) => {
      if (a[0] === '기타') return 1;
      if (b[0] === '기타') return -1;
      return a[0].localeCompare(b[0], 'ko');
    });
    const statuses = [...statusCounts.entries()].sort((a, b) => a[0].localeCompare(b[0], 'ko'));

    const visible = getVisibleMembersForMenuCounts();

    updateInlineAllButton('groupAllBtn', !state.filters.교구, visible.length || state.members.length);
    updateInlineAllButton('roleAllBtn', !state.filters.직분, visible.length || state.members.length);
    updateInlineAllButton('statusAllBtn', !state.filters.현재상태, visible.length || state.members.length);

    const groupList = $('교구FilterList');
    groupList.innerHTML = '';
    for (const [village, count] of villages) {
      groupList.appendChild(makeFilterBtn({
        label: village,
        count,
        type: '교구',
        value: village,
        active: normalizeText(state.filters.교구) === village
      }));
    }

    const roleList = $('직분FilterList');
    roleList.innerHTML = '';
    ROLE_ORDER.forEach(role => {
      const count = roleCounts.get(role);
      if (!count) return;
      roleList.appendChild(makeFilterBtn({
        label: role,
        count,
        type: '직분',
        value: role,
        active: normalizeText(state.filters.직분) === role
      }));
    });

    const statusList = $('상태FilterList');
    statusList.innerHTML = '';
    for (const [status, count] of statuses) {
      statusList.appendChild(makeFilterBtn({
        label: status,
        count,
        type: '현재상태',
        value: status,
        active: normalizeText(state.filters.현재상태) === status
      }));
    }

    updateGenderButtons();
    updateAgeButtons();
  }

  function applyFilters() {
    const q = state.searchQuery;
    state.filtered = state.members.filter(member => {
      const group = getVillageFilterValue(member);
      if (state.filters.교구 && group !== normalizeText(state.filters.교구)) return false;
      if (state.filters.직분 && normalizeRole(member) !== state.filters.직분) return false;
      if (state.filters.성별 !== '전체' && normalizeText(member.성별) !== state.filters.성별) return false;
      if (state.filters.세대 !== '전체' && getAgeGroup(member) !== state.filters.세대) return false;
      if (state.filters.현재상태 && normalizeText(member.현재상태) !== state.filters.현재상태) return false;
      if (state.filters.세례 && normalizeText(member.세례) !== state.filters.세례) return false;
      if (state.filters.구역 && normalizeText(member.구역) !== state.filters.구역) return false;
      if (state.filters.세부직분 && normalizeText(member.세부직분) !== state.filters.세부직분) return false;
      if (q) {
        const hay = [member.이름, member.가족전체, member.구역, member.교구, member.직분, member.세부직분, member.핸드폰, member.전화번호]
          .map(normalizeText)
          .join(' ')
          .toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    const dir = state.sortDir;
    const col = state.sortCol;
    state.filtered.sort((a, b) => {
      let av, bv;
      if (col === '직분') {
        av = roleSortIndex(normalizeRole(a));
        bv = roleSortIndex(normalizeRole(b));
        if (av !== bv) return (av - bv) * dir;
        av = normalizeText(a.이름);
        bv = normalizeText(b.이름);
      } else if (col === '나이') {
        av = Number(a[col] || 0);
        bv = Number(b[col] || 0);
      } else if (col === '등록일') {
        av = formatDate(a[col]);
        bv = formatDate(b[col]);
      } else {
        av = normalizeText(a[col]);
        bv = normalizeText(b[col]);
      }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return 0;
    });

    const totalPages = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
    if (state.currentPage > totalPages) state.currentPage = 1;
  }

  function getResultSummaryLabel() {
    const labels = [];
    if (state.filters.교구) labels.push(state.filters.교구);
    if (state.filters.직분) labels.push(state.filters.직분);
    if (state.filters.성별 !== '전체') labels.push(state.filters.성별 === '남' ? '남성' : '여성');
    if (state.filters.세대 !== '전체') labels.push(state.filters.세대);
    if (state.filters.현재상태) labels.push(state.filters.현재상태);
    if (state.filters.세례) labels.push(state.filters.세례);
    if (state.filters.구역) labels.push(`구역: ${state.filters.구역}`);
    if (state.filters.세부직분) labels.push(`세부직분: ${state.filters.세부직분}`);
    if (state.searchQuery) labels.push(`검색: ${state.searchQuery}`);
    return labels.length ? labels.join(' · ') : '전체';
  }

  function renderActiveFilters() {
    const container = $('activeFilters');
    container.innerHTML = '';
    const tags = [];
    if (state.filters.교구) tags.push([state.filters.교구, () => { state.filters.교구 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.직분) tags.push([state.filters.직분, () => { state.filters.직분 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.성별 !== '전체') tags.push([state.filters.성별 + '성', () => { state.filters.성별 = '전체'; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.세대 !== '전체') tags.push([state.filters.세대, () => { state.filters.세대 = '전체'; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.현재상태) tags.push([state.filters.현재상태, () => { state.filters.현재상태 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.세례) tags.push([state.filters.세례, () => { state.filters.세례 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.구역) tags.push([`구역: ${state.filters.구역}`, () => { state.filters.구역 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.세부직분) tags.push([`세부직분: ${state.filters.세부직분}`, () => { state.filters.세부직분 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.searchQuery) tags.push([`"${state.searchQuery}"`, () => { state.searchQuery = ''; els.searchInput.value=''; rerender({resetPage:true}); }]);

    for (const [label, onRemove] of tags) {
      const tag = document.createElement('div');
      tag.className = 'filter-tag';
      tag.innerHTML = `<span>${label}</span><button type="button">×</button>`;
      tag.querySelector('button').addEventListener('click', onRemove);
      container.appendChild(tag);
    }
    const info = document.createElement('span');
    info.className = 'result-info';
    info.innerHTML = `<strong>${getResultSummaryLabel()}</strong> ${state.filtered.length.toLocaleString()}명`;
    container.appendChild(info);
  }


  
function getChartData(type, members = state.filtered) {
    const counts = new Map();
    const source = Array.isArray(members) ? members : [];
    if (type === '교구') {
      source.forEach(member => {
        const value = getVillageFilterValue(member);
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => {
        if (a[0] === '기타') return 1;
        if (b[0] === '기타') return -1;
        return a[0].localeCompare(b[0], 'ko');
      });
    }
    if (type === '직분') {
      source.forEach(member => {
        const value = normalizeRole(member);
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => roleSortIndex(a[0]) - roleSortIndex(b[0]));
    }
    if (type === '성별') {
      source.forEach(member => {
        const value = normalizeText(member.성별) || '미기재';
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => b[1] - a[1]);
    }
    if (type === '세대') {
      source.forEach(member => {
        const value = getAgeGroup(member) || '미분류';
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => {
        const an = parseInt(a[0], 10);
        const bn = parseInt(b[0], 10);
        if (Number.isFinite(an) && Number.isFinite(bn)) return an - bn;
        return a[0].localeCompare(b[0], 'ko');
      });
    }
    if (type === '현재상태') {
      source.forEach(member => {
        const value = normalizeText(member.현재상태) || '미기재';
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => b[1] - a[1]);
    }
    return [];
  }

  function getChartColor(index) {
    const palette = [
      '#c8a96e', '#e87a5a', '#7ec8e3', '#c97ecb', '#7bce9a',
      '#8aa0c8', '#e3a87e', '#e8a0b8', '#a8b8d8', '#f0c060',
      '#73c7b3', '#d98fbc'
    ];
    return palette[index % palette.length];
  }

  function buildPieChartSvg(data, total, chartType) {
    if (!data.length) {
      return '<div class="empty-state"><div class="icon">🥧</div><h3>표시할 데이터가 없습니다</h3></div>';
    }
    const cx = 110;
    const cy = 110;
    const radius = 84;
    const innerRadius = 48;
    let currentAngle = -Math.PI / 2;
    const paths = data.map(([label, count], index) => {
      const fraction = total ? count / total : 0;
      const angle = fraction * Math.PI * 2;
      const nextAngle = currentAngle + angle;
      const x1 = cx + radius * Math.cos(currentAngle);
      const y1 = cy + radius * Math.sin(currentAngle);
      const x2 = cx + radius * Math.cos(nextAngle);
      const y2 = cy + radius * Math.sin(nextAngle);
      const ix1 = cx + innerRadius * Math.cos(currentAngle);
      const iy1 = cy + innerRadius * Math.sin(currentAngle);
      const ix2 = cx + innerRadius * Math.cos(nextAngle);
      const iy2 = cy + innerRadius * Math.sin(nextAngle);
      const largeArc = angle > Math.PI ? 1 : 0;
      const encodedLabel = encodeURIComponent(label);
      const color = getChartColor(index);
      let d = '';
      if (angle >= Math.PI * 1.999) {
        d = [
          `M ${cx + radius} ${cy}`,
          `A ${radius} ${radius} 0 1 1 ${cx - radius} ${cy}`,
          `A ${radius} ${radius} 0 1 1 ${cx + radius} ${cy}`,
          `L ${cx + innerRadius} ${cy}`,
          `A ${innerRadius} ${innerRadius} 0 1 0 ${cx - innerRadius} ${cy}`,
          `A ${innerRadius} ${innerRadius} 0 1 0 ${cx + innerRadius} ${cy}`,
          'Z'
        ].join(' ');
      } else {
        d = [
          `M ${x1} ${y1}`,
          `A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`,
          `L ${ix2} ${iy2}`,
          `A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${ix1} ${iy1}`,
          'Z'
        ].join(' ');
      }
      currentAngle = nextAngle;
      return `<path class="chart-slice" d="${d}" fill="${color}" data-chart-select-type="${chartType}" data-chart-select-value="${encodedLabel}"><title>${label}: ${count}명 (${(fraction * 100).toFixed(1)}%)</title></path>`;
    }).join('');
    return `<svg class="chart-pie-svg" viewBox="0 0 220 220" role="img" aria-label="${chartType} 원형 그래프">${paths}<circle class="chart-pie-hole" cx="${cx}" cy="${cy}" r="${innerRadius - 4}"></circle><text class="chart-pie-center-text" x="${cx}" y="${cy - 4}">${total.toLocaleString()}명</text><text class="chart-pie-center-subtext" x="${cx}" y="${cy + 15}">현재 결과</text></svg>`;
  }

  function applyChartSelection(type, value) {
    const normalizedValue = normalizeText(value);
    if (!normalizedValue) return;
    state.view = 'table';
    state.chartType = null;
    if (type === '교구') state.filters.교구 = normalizedValue;
    else if (type === '직분') state.filters.직분 = normalizedValue;
    else if (type === '성별') state.filters.성별 = normalizedValue;
    else if (type === '세대') state.filters.세대 = normalizedValue;
    else if (type === '현재상태') state.filters.현재상태 = normalizedValue;
    else return;
    closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
  }

  function renderChart() {
    const panel = $('chartPanel');
    const tableWrap = $('tableWrap');
    if (state.view !== 'chart' || !state.chartType) {
      panel.style.display = 'none';
      tableWrap.style.display = '';
      return;
    }
    const data = getChartData(state.chartType, state.filtered);
    const total = data.reduce((sum, [, count]) => sum + count, 0);
    const baseLabel = getResultSummaryLabel();
    $('chartTitle').textContent = `${state.chartType} 비율 그래프`;
    $('chartSubtitle').textContent = `${baseLabel} · ${total.toLocaleString()}명 기준`;
    $('chartHint').textContent = '현재 필터된 결과만 기준으로 계산했습니다. 그래프 항목을 클릭하면 해당 성도 목록으로 이동합니다.';

    if (!data.length) {
      $('chartBars').innerHTML = '<div class="empty-state"><div class="icon">📊</div><h3>표시할 데이터가 없습니다</h3><p>먼저 성도 명단을 불러오거나 필터를 조정해 주세요</p></div>';
      $('chartPieWrap').innerHTML = '<div class="empty-state"><div class="icon">🥧</div><h3>원형 그래프를 표시할 수 없습니다</h3></div>';
      $('chartLegend').innerHTML = '';
      panel.style.display = 'block';
      tableWrap.style.display = 'none';
      return;
    }

    $('chartBars').innerHTML = data.map(([label, count], index) => {
      const percent = total ? (count / total) * 100 : 0;
      const encodedLabel = encodeURIComponent(label);
      const color = getChartColor(index);
      return `<div class="chart-row" data-chart-select-type="${state.chartType}" data-chart-select-value="${encodedLabel}">
        <div class="chart-label">${label}</div>
        <div class="chart-bar-track">
          <div class="chart-bar-fill" style="width:${Math.max(percent, 3)}%; background:linear-gradient(90deg, ${color} 0%, var(--accent2) 100%);">${percent.toFixed(1)}%</div>
        </div>
        <div class="chart-value">${count.toLocaleString()}명</div>
      </div>`;
    }).join('');

    $('chartPieWrap').innerHTML = buildPieChartSvg(data, total, state.chartType);
    $('chartLegend').innerHTML = data.map(([label, count], index) => {
      const percent = total ? (count / total) * 100 : 0;
      const encodedLabel = encodeURIComponent(label);
      const color = getChartColor(index);
      return `<div class="chart-legend-item" data-chart-select-type="${state.chartType}" data-chart-select-value="${encodedLabel}">
        <span class="chart-swatch" style="background:${color};"></span>
        <span class="chart-legend-label">${label}</span>
        <span class="chart-legend-value">${count.toLocaleString()}명 · ${percent.toFixed(1)}%</span>
      </div>`;
    }).join('');

    panel.style.display = 'block';
    tableWrap.style.display = 'none';
  }

    state.view = 'chart';
    state.chartType = type;
    renderChart();

function renderTable() {

  function renderPagination() {
    const total = Math.ceil(state.filtered.length / PAGE_SIZE);
    const pg = els.pagination;
    if (total <= 1) { pg.innerHTML = ''; return; }
    let html = `<button type="button" class="page-btn" data-page="${state.currentPage - 1}" ${state.currentPage === 1 ? 'disabled' : ''}>‹</button>`;
    for (let i = 1; i <= total; i++) {
      if (total > 9 && i !== 1 && i !== total && Math.abs(i - state.currentPage) > 1) {
        if (i === 2 || i === total - 1 || i === state.currentPage - 2 || i === state.currentPage + 2) {
          html += '<span style="color:var(--text3);padding:0 4px">…</span>';
        }
        continue;
      }
      html += `<button type="button" class="page-btn ${i === state.currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }
    html += `<button type="button" class="page-btn" data-page="${state.currentPage + 1}" ${state.currentPage === total ? 'disabled' : ''}>›</button>`;
    pg.innerHTML = html;
  }

    });

    $('chartPanel').addEventListener('click', (e) => {
      const target = e.target.closest('[data-chart-select-type]');
      if (!target) return;
      const type = target.dataset.chartSelectType;
      const value = decodeURIComponent(target.dataset.chartSelectValue || '');
      applyChartSelection(type, value);
    });

    document.querySelector('thead').addEventListener('click', (e) => {
      const th = e.target.closest('th[data-sort]');
      if (!th) return;
      const col = th.dataset.sort;
      if (state.sortCol === col) state.sortDir *= -1;
      else { state.sortCol = col; state.sortDir = 1; }
      rerender();
    });

    els.tableBody.addEventListener('click', (e) => {
      const familyLink = e.target.closest('[data-family-member-id]');
      if (familyLink) {
        e.stopPropagation();
        showDetail(familyLink.dataset.familyMemberId);
        return;
      }
      const row = e.target.closest('tr[data-member-id]');
      if (row) showDetail(row.dataset.memberId);
    });

    els.pagination.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-page]');
      if (!btn || btn.disabled) return;
      const total = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
      const next = Number(btn.dataset.page || 1);
      if (next < 1 || next > total) return;
      state.currentPage = next;
      renderTable();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    $('modalMeta').addEventListener('click', (e) => {
      const badge = e.target.closest('[data-badge-filter-type]');
      if (!badge) return;
      applyBadgeFilter(badge.dataset.badgeFilterType, badge.dataset.badgeFilterValue);
    });
    $('modalBody').addEventListener('click', (e) => {
      const badge = e.target.closest('[data-badge-filter-type]');
      if (badge) {
        applyBadgeFilter(badge.dataset.badgeFilterType, badge.dataset.badgeFilterValue);
        return;
      }
      const familyTag = e.target.closest('[data-family-member-id]');
      if (!familyTag) return;
      showDetail(familyTag.dataset.familyMemberId);
    });


    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { if (window.innerWidth > 640) closeMobileSidebar(); rerender(); }, 80);
    });
  }

  function buildJsonPickerNotice(message) {
    return `
      <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;">
        <div>${message}</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <label for="jsonFileInput" style="display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid rgba(200,169,110,0.35); border-radius:8px; background:rgba(200,169,110,0.12); color:var(--accent2); cursor:pointer; font-weight:500;">
            JSON 파일 선택
          </label>
          <input id="jsonFileInput" type="file" accept=".json,application/json" style="display:none;" />
        </div>
      </div>
    `;
  }

  function finalizeLoadedData(data) {
    if (!Array.isArray(data)) throw new Error('JSON 형식 오류');
    state.members = data;
    hideNotice();
    buildFilters();
    closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
  }

  async function loadDataFromSelectedFile(file) {
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      finalizeLoadedData(data);
    } catch (err) {
      showNotice(buildJsonPickerNotice('선택한 JSON 파일을 읽지 못했습니다.<br><strong>church_members.json</strong> 형식인지 확인해 주세요.'), true);
      const input = $('jsonFileInput');
      if (input) input.addEventListener('change', (e) => loadDataFromSelectedFile(e.target.files?.[0]), { once: true });
    }
  }

  function promptJsonSelection(message) {
    const noticeMessage = message || '자동 불러오기에 실패했습니다. <strong>church_members.json</strong> 파일을 직접 선택해 주세요.';
    showNotice(buildJsonPickerNotice(noticeMessage), true);
    const input = $('jsonFileInput');
    if (input) {
      input.value = '';
      input.addEventListener('change', (e) => loadDataFromSelectedFile(e.target.files?.[0]), { once: true });
    }
  }

  async function loadDefaultJson() {
    showNotice('명단 데이터를 불러오는 중입니다...');
    try {
      const response = await fetch('./church_members.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      const data = await response.json();
      finalizeLoadedData(data);
    } catch (error) {
      //console.error('church_members.json 자동 불러오기 실패:', error);
      //promptJsonSelection('자동으로 <strong>church_members.json</strong> 파일을 불러오지 못했습니다.<br>GitHub Pages에 올릴 때는 HTML 파일과 JSON 파일을 같은 폴더에 함께 업로드해 주세요.');
    }
  }

  function init() {
    els.searchInput = $('searchInput');
    els.tableBody = $('tableBody');
    els.pagination = $('pagination');
    bindEvents();
    loadDefaultJson();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
