<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시흥교회 교인명단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3047;
    --accent: #c8a96e;
    --accent2: #e8d5a3;
    --text: #e8eaf0;
    --text2: #9aa0b4;
    --text3: #6b7390;
    --장로: #f0c060;
    --목사: #e87a5a;
    --안수집사: #7ec8e3;
    --권사: #c97ecb;
    --집사: #7bce9a;
    --성도: #8aa0c8;
    --전도사: #e3a87e;
    --사모: #e8a0b8;
    --명예권사: #a8b8d8;
    --other: #9090a0;
    --mobile-user-scale: 1;
    --mobile-gesture-zooming: 0;
    --mobile-elder-scale: 1.25;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body.pinch-zooming {
    user-select: none;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1020 0%, #1a1f35 50%, #0d1020 100%);
    border-bottom: 1px solid var(--accent);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .church-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .church-subtitle {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .reset-home-btn {
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
    text-align: left;
  }
  .reset-home-btn:hover {
    color: var(--accent2);
  }
  .header-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
  }
  .total-count {
    font-size: 13px;
    color: var(--text2);
  }
  .total-count strong {
    color: var(--accent2);
    font-size: 18px;
    font-weight: 700;
  }

  /* SEARCH BAR */
  .header-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 260px;
    justify-content: flex-end;
  }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    max-width: 380px;
    position: relative;
  }
  .header-filter-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .header-filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(200,169,110,0.10);
  }
  .header-filter-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
  }

  .font-control {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
  }
  .font-btn {
    width: 28px;
    height: 28px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .font-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }
  .font-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }
  #searchInput {
    width: 100%;
    padding: 9px 14px 9px 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }

  /* MAIN LAYOUT */
  .main-wrap {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 24px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* SIDEBAR FILTERS */
  .sidebar {
    position: sticky;
    top: 90px;
  }
  .filter-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .filter-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .filter-title-text {
    display: inline-flex;
    align-items: center;
    min-width: 0;
  }
  .inline-all-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: none;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .inline-all-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }
  .inline-all-btn.active {
    background: rgba(200,169,110,0.12);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .filter-section:nth-of-type(1) .inline-all-btn.active { background: rgba(123,206,154,0.18); border-color: rgba(123,206,154,0.42); color: #e6fff0; }
  .filter-section:nth-of-type(2) .inline-all-btn.active { background: rgba(201,126,203,0.18); border-color: rgba(201,126,203,0.42); color: #ffeaff; }
  .filter-section:nth-of-type(3) .inline-all-btn.active { background: rgba(126,200,227,0.18); border-color: rgba(126,200,227,0.42); color: #e6f9ff; }
  .filter-section:nth-of-type(4) .inline-all-btn.active { background: rgba(126,200,227,0.18); border-color: rgba(126,200,227,0.42); color: #e6f9ff; }
  .filter-section:nth-of-type(5) .inline-all-btn.active { background: rgba(227,168,126,0.18); border-color: rgba(227,168,126,0.40); color: #fff2e5; }
  .filter-section:nth-of-type(6) .inline-all-btn.active { background: rgba(138,160,200,0.18); border-color: rgba(138,160,200,0.40); color: #edf3ff; }
  .filter-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
    padding: 10px;
  }
  .filter-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 58px;
    padding: 8px 6px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    gap: 4px;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    font-weight: 500;
  }
  .filter-btn span:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .filter-count {
    font-size: 11px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    color: var(--text3);
    min-width: 28px;
    text-align: center;
  }
  .filter-btn.active .filter-count {
    background: rgba(200,169,110,0.2);
    color: var(--accent);
  }

  /* GENDER FILTER */
  .gender-row {
    display: flex;
    gap: 6px;
    padding: 10px;
  }
  .gender-btn {
    flex: 1;
    padding: 7px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .gender-btn:hover { background: var(--surface2); }
  .gender-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    border-color: var(--accent);
    font-weight: 500;
  }
  .gender-btn.is-top,
  .age-btn.is-top {
    box-shadow: inset 0 0 0 1px rgba(232,213,163,0.18);
  }
  .filter-btn-main {
    display: block;
    font-weight: 600;
    line-height: 1.2;
  }
  .filter-btn-sub {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: var(--text3);
    line-height: 1.2;
  }
  .gender-btn.active .filter-btn-sub,
  .age-btn.active .filter-btn-sub {
    color: var(--accent);
  }

  .age-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
  }
  .age-btn {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .age-btn:hover { background: var(--surface2); }
  .age-btn.active {
    background: rgba(200,169,110,0.12);
    color: var(--accent2);
    border-color: var(--accent);
    font-weight: 500;
  }

  /* CONTENT AREA */
  .content-area {}

  /* ACTIVE FILTERS */
  .active-filters {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    min-height: 32px;
  }
  .filter-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 12px;
    background: rgba(200,169,110,0.12);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent2);
  }
  .filter-tag button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    opacity: 0.7;
  }
  .filter-tag button:hover { opacity: 1; }
  .result-info {
    font-size: 13px;
    color: var(--text3);
    margin-left: auto;
  }
  .result-info strong { color: var(--accent2); }

  /* TABLE */
  .table-wrap {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    max-height: calc(100vh - 220px);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 20;
  }
  th {
    position: sticky;
    top: 0;
    z-index: 21;
    padding: 12px 14px;
    text-align: left;
    vertical-align: middle;
    line-height: 1.2;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
    background: linear-gradient(180deg, #1e2540 0%, var(--surface2) 100%);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(0,0,0,0.18);
  }
  th:hover { color: var(--accent2); }
  th.sorted { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid rgba(42,48,71,0.6);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(200,169,110,0.05); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; color: var(--text2); vertical-align: middle; }
  td.name-cell {
    font-weight: 600;
    color: var(--text);
    font-size: 14px;
    white-space: nowrap;
  }
  .관계-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    background: var(--surface2);
    color: var(--text3);
    vertical-align: middle;
  }
  .duplicate-hint {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    margin-left: 6px;
    background: rgba(126,200,227,0.12);
    border: 1px solid rgba(126,200,227,0.24);
    color: #d8f5ff;
    vertical-align: middle;
  }
  .name-role-inline {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .name-role-sub {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
  }

  /* JIKBUN BADGE */
  .jik-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .jik-badge.is-clickable {
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .jik-badge.is-clickable:hover {
    transform: translateY(-1px);
    opacity: 0.92;
  }
  .modal-meta .jik-badge {
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .modal-meta .jik-badge.is-clickable {
    position: relative;
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .modal-meta .jik-badge.is-clickable.is-active {
    color: #fff7e3;
    border-color: rgba(232,213,163,0.78) !important;
    box-shadow: 0 0 0 2px rgba(200,169,110,0.24), 0 10px 22px rgba(0,0,0,0.26), inset 0 1px 0 rgba(255,255,255,0.14);
    filter: brightness(1.12) saturate(1.08);
  }
  .modal-meta .jik-badge.is-clickable.is-active::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(232,213,163,0.18), rgba(255,255,255,0.02));
    pointer-events: none;
  }
  .modal-meta .jik-badge.is-clickable > span {
    position: relative;
    z-index: 1;
  }
  .modal-meta .jik-badge.is-clickable:hover {
    transform: translateY(-1px);
    opacity: 1;
    filter: brightness(1.08);
  }
  .modal-meta [data-badge-filter-type="성별"] {
    background: rgba(126,200,227,0.18);
    color: #d8f5ff;
    border: 1px solid rgba(126,200,227,0.45);
  }
  .modal-meta [data-badge-filter-type="세례"] {
    background: rgba(123,206,154,0.18);
    color: #dff9e8;
    border: 1px solid rgba(123,206,154,0.42);
  }
  .modal-meta [data-badge-filter-type="현재상태"] {
    box-shadow: 0 6px 18px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .modal-meta [data-badge-filter-type="성별"].is-active {
    background: linear-gradient(135deg, rgba(126,200,227,0.34), rgba(126,200,227,0.18));
    color: #f4fcff;
  }
  .modal-meta [data-badge-filter-type="세례"].is-active {
    background: linear-gradient(135deg, rgba(123,206,154,0.34), rgba(123,206,154,0.18));
    color: #f4fff7;
  }
  .modal-meta [data-badge-filter-type="현재상태"].is-active {
    background: linear-gradient(135deg, rgba(200,169,110,0.36), rgba(200,169,110,0.18));
    color: #fff7e8;
  }
  .modal-meta [data-badge-filter-type="직분"].is-active {
    box-shadow: 0 0 0 2px rgba(200,169,110,0.24), 0 10px 22px rgba(0,0,0,0.26), inset 0 1px 0 rgba(255,255,255,0.14);
  }
  .jik-장로 { background: rgba(240,192,96,0.15); color: var(--장로); border: 1px solid rgba(240,192,96,0.3); }
  .jik-목사 { background: rgba(232,122,90,0.15); color: var(--목사); border: 1px solid rgba(232,122,90,0.3); }
  .jik-안수집사 { background: rgba(126,200,227,0.15); color: var(--안수집사); border: 1px solid rgba(126,200,227,0.3); }
  .jik-권사 { background: rgba(201,126,203,0.15); color: var(--권사); border: 1px solid rgba(201,126,203,0.3); }
  .jik-집사 { background: rgba(123,206,154,0.15); color: var(--집사); border: 1px solid rgba(123,206,154,0.3); }
  .jik-성도 { background: rgba(138,160,200,0.15); color: var(--성도); border: 1px solid rgba(138,160,200,0.3); }
  .jik-전도사 { background: rgba(227,168,126,0.15); color: var(--전도사); border: 1px solid rgba(227,168,126,0.3); }
  .jik-사모 { background: rgba(232,160,184,0.15); color: var(--사모); border: 1px solid rgba(232,160,184,0.3); }
  .jik-명예권사 { background: rgba(168,184,216,0.15); color: var(--명예권사); border: 1px solid rgba(168,184,216,0.3); }
  .jik-other { background: rgba(144,144,160,0.15); color: var(--other); border: 1px solid rgba(144,144,160,0.3); }

  .value-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    border: 1px solid color-mix(in srgb, var(--badge-color, var(--accent)) 34%, transparent);
    background: color-mix(in srgb, var(--badge-color, var(--accent)) 15%, transparent);
    color: var(--badge-color, var(--accent2));
  }
  .value-badge.is-clickable {
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .value-badge.is-clickable:hover {
    transform: translateY(-1px);
    opacity: 0.94;
  }
  .modal-value .value-badge {
    min-height: 28px;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .modal-value .value-badge.is-clickable {
    box-shadow: 0 6px 18px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .modal-value .value-badge.is-clickable.is-active {
    color: #fff7e3;
    border-color: rgba(232,213,163,0.78) !important;
    box-shadow: 0 0 0 2px rgba(200,169,110,0.22), 0 10px 22px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.14);
    filter: brightness(1.12) saturate(1.08);
  }
  .modal-value .value-badge.is-clickable:hover {
    opacity: 1;
    filter: brightness(1.08);
  }
  .family-cell {
    max-width: 320px;
    font-size: 12px;
    color: var(--text3);
  }
  .family-inline-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 8px;
    align-items: center;
  }
  .family-inline-name {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--text3);
    max-width: 100%;
  }
  .family-inline-name.is-link {
    color: var(--accent2);
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
  }
  .family-inline-name.is-link:hover {
    color: var(--accent);
    text-decoration: underline;
  }
  .family-inline-jik {
    color: var(--text3);
    font-size: 11px;
  }

  .chart-toggle {
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .chart-toggle:hover {
    color: var(--accent2);
    background: rgba(200,169,110,0.08);
  }
  .chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .chart-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .chart-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
  }
  .chart-subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
  }
  .chart-hint {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text3);
  }
  .chart-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.9fr);
    gap: 20px;
    align-items: start;
  }
  .chart-bars {
    display: grid;
    gap: 12px;
  }
  .chart-row {
    display: grid;
    grid-template-columns: 130px 1fr 84px;
    gap: 12px;
    align-items: center;
    cursor: pointer;
  }
  .chart-row:hover .chart-bar-track {
    border-color: rgba(200,169,110,0.65);
  }
  .chart-label {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chart-bar-track {
    height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .chart-row:hover .chart-bar-track {
    transform: translateY(-1px);
  }
  .chart-bar-fill {
    height: 100%;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    min-width: 52px;
    color: #2b2212;
    font-size: 12px;
    font-weight: 700;
    width: 0;
    will-change: width;
    transition: width 820ms cubic-bezier(0.22, 1, 0.36, 1), filter 0.2s ease;
    transition-delay: var(--bar-delay, 0ms);
  }
  .chart-bars .chart-row {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.34s ease, transform 0.34s ease;
    transition-delay: var(--bar-delay, 0ms);
  }
  .chart-bars.chart-animate-ready .chart-row {
    opacity: 1;
    transform: translateY(0);
  }
  .chart-bars.chart-animate-ready .chart-bar-fill {
    width: var(--target-width, 0%);
  }
  .chart-value {
    text-align: right;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  .chart-side {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .chart-side-title {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 12px;
  }
  .chart-pie-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 14px;
  }
  .chart-pie-svg {
    width: 220px;
    height: 220px;
    overflow: visible;
  }
  @property --pie-progress {
    syntax: '<angle>';
    inherits: false;
    initial-value: 0deg;
  }
  .chart-pie-reveal {
    --pie-progress: 0deg;
    width: 220px;
    height: 220px;
    -webkit-mask-image: conic-gradient(from -90deg, #000 0deg, #000 var(--pie-progress), transparent calc(var(--pie-progress) + 0.6deg), transparent 360deg);
    mask-image: conic-gradient(from -90deg, #000 0deg, #000 var(--pie-progress), transparent calc(var(--pie-progress) + 0.6deg), transparent 360deg);
    will-change: transform;
  }
  .chart-pie-wrap.pie-animate-ready .chart-pie-reveal {
    animation: pieSweepReveal 1200ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes pieSweepReveal {
    from { --pie-progress: 0deg; }
    to { --pie-progress: 360deg; }
  }
  .chart-pie-hole {
    fill: var(--surface);
  }
  .chart-pie-center-text {
    fill: var(--accent2);
    font-size: 12px;
    font-weight: 700;
    text-anchor: middle;
  }
  .chart-pie-center-subtext {
    fill: var(--text3);
    font-size: 10px;
    text-anchor: middle;
  }
  .chart-slice {
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
    transform-origin: 110px 110px;
    opacity: 0.78;
  }
  .chart-pie-wrap.pie-animate-ready .chart-slice {
    animation: pieSlicePop 480ms ease both;
    animation-delay: calc(var(--slice-delay, 0ms) + 180ms);
  }
  @keyframes pieSlicePop {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
  .chart-slice:hover {
    opacity: 0.95;
    filter: brightness(1.08);
  }
  .chart-legend {
    display: grid;
    gap: 8px;
  }
  .chart-legend-item {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .chart-legend-item:hover {
    border-color: rgba(200,169,110,0.65);
    transform: translateY(-1px);
  }
  .chart-swatch {
    width: 12px;
    height: 12px;
    border-radius: 999px;
  }
  .chart-legend-label {
    font-size: 12px;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chart-legend-value {
    font-size: 12px;
    color: var(--accent2);
    white-space: nowrap;
    font-weight: 600;
  }
  .chart-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .chart-sort-label {
    font-size: 12px;
    color: var(--text3);
  }
  .chart-sort-buttons {
    display: inline-flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .chart-sort-btn {
    min-height: 32px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .chart-sort-btn:hover {
    border-color: rgba(200,169,110,0.68);
    color: var(--accent2);
  }
  .chart-sort-btn.active {
    background: rgba(200,169,110,0.14);
    border-color: var(--accent);
    color: var(--accent2);
    box-shadow: 0 0 0 1px rgba(200,169,110,0.12) inset;
  }
  .chart-row.is-top .chart-label {
    color: var(--accent2);
    font-weight: 700;
  }
  .chart-row.is-top .chart-bar-track {
    border-color: rgba(200,169,110,0.72);
    box-shadow: 0 0 0 1px rgba(200,169,110,0.14) inset;
  }
  .chart-panel.is-drilling {
    animation: chartDrillFade 0.22s ease forwards;
  }
  .chart-row.is-drilling .chart-bar-track,
  .chart-legend-item.is-drilling,
  .chart-slice.is-drilling {
    animation: chartTargetPulse 0.22s ease;
  }
  .table-wrap.is-drill-target {
    animation: drillTargetReveal 0.42s ease;
  }
  @keyframes chartDrillFade {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0.25; transform: scale(0.985); }
  }
  @keyframes chartTargetPulse {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.015); filter: brightness(1.16); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  @keyframes drillTargetReveal {
    0% { transform: translateY(10px); opacity: 0.55; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* PAGINATION */
  .pagination {

  .page-btn {
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 13px;

<script>
(() => {
  const PAGE_SIZE = 50;
  const ROLE_ORDER = ['장로','목사','사모','안수집사','전도사','권사','집사','성도','기타'];

  const state = {
    members: [],
    filtered: [],
    currentPage: 1,
    sortCol: '이름',
    sortDir: 1,
    searchQuery: '',
    view: 'table',
    chartType: null,
    chartSort: 'label_asc',
    filters: {
      교구: null,
      직분: null,
      성별: '전체',
      세대: '전체',
      현재상태: null,
      세례: null,
      구역: null,
      세부직분: null,
      등록년도: '전체',
      이름: null
    }
  };

  const els = {};

  function $(id) { return document.getElementById(id); }

  function normalizeText(value) {
    return String(value ?? '').trim().replace(/\s+/g, ' ');
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeLooseSearch(value) {
    return normalizeText(value).toLowerCase().replace(/\s+/g, '');
  }

  function getMembersByName(name) {
    const target = normalizeText(name);
    if (!target) return [];
    return state.members.filter(member => normalizeText(member.이름) === target);
  }

  function isDuplicateName(name) {
    return getMembersByName(name).length > 1;
  }

  function getDuplicateBadge(name) {
    const matches = getMembersByName(name);
    if (matches.length <= 1) return '';
    return `<span class="duplicate-hint">동명이인 ${matches.length}명</span>`;
  }

  function getMemberDisambiguation(member) {
    const role = getRoleBadgeLabel(member);
    const district = normalizeText(member.구역);
    const village = normalizeText(member.교구);
    return [role, district || village].filter(Boolean).join(' · ');
  }

  function renderDisplayName(member) {
    const name = escapeHtml(normalizeText(member.이름));
    const role = escapeHtml(getRoleBadgeLabel(member));
    const duplicate = isDuplicateName(member.이름);
    const roleHtml = duplicate ? `<span class="name-role-sub">${role}</span>` : '';
    return `<span class="name-role-inline"><span>${name}</span>${roleHtml}</span>${getDuplicateBadge(member.이름)}`;
  }

  function renderModalName(member) {
    const name = normalizeText(member.이름);
    const clickable = !!name;
    return `<button type="button" class="modal-name-button${clickable ? ' is-clickable' : ''}" ${clickable ? `data-name-filter="${escapeHtml(name)}" data-name-filter-id="${escapeHtml(member.ID)}"` : ''}>${escapeHtml(name || '-')}</button>`;
  }

  function renderDuplicateQuickList(member) {
    const matches = getMembersByName(member.이름);
    if (matches.length <= 1) return '';
    const items = matches.map(item => {
      const isCurrent = String(item.ID) === String(member.ID);
      return `<button type="button" class="duplicate-quick-btn${isCurrent ? ' is-current' : ''}" ${isCurrent ? 'disabled' : `data-member-id="${escapeHtml(item.ID)}"`}><span class="duplicate-quick-name">${escapeHtml(normalizeText(item.이름))}</span><span class="duplicate-quick-detail">${escapeHtml(getMemberDisambiguation(item) || '정보 없음')}</span></button>`;
    }).join('');
    return `<span class="duplicate-summary-badge">동명이인 ${matches.length}명</span><div class="duplicate-quick-list">${items}</div>`;
  }

  function getFamilySearchKey(member) {
    if (!member) return '';
    const familyText = normalizeText(member.가족전체);
    if (familyText) return `family:${familyText}`;
    const householdHead = normalizeText(member.세대주);
    if (householdHead) return `head:${householdHead}`;
    const spouse = normalizeText(member.배우자);
    if (spouse) {
      const pair = [normalizeText(member.이름), spouse].filter(Boolean).sort().join('|');
      if (pair) return `pair:${pair}`;
    }
    return '';
  }

  function applyNameFilter(memberIdOrName) {
    const targetMember = state.members.find(member => String(member.ID) === String(memberIdOrName)) || null;
    const normalizedName = targetMember ? normalizeText(targetMember.이름) : normalizeText(memberIdOrName);
    if (!normalizedName) return;

    state.filters.이름 = null;
    state.filters.이름가족키 = null;
    state.searchQuery = normalizedName.toLowerCase();
    if (els.searchInput) els.searchInput.value = normalizedName;

    $('modalBg').classList.remove('open');
    closeMobileSidebar();
    rerender({ rebuildFilters: true, resetPage: true });
  }

  function normalizeRole(member) {
    const raw = `${member?.직분 || ''} ${member?.세부직분 || ''}`.trim();
    if (!raw) return '기타';
    if (raw.includes('장로')) return '장로';
    if (raw.includes('목사')) return '목사';
    if (raw.includes('사모')) return '사모';
    if (raw.includes('안수집사')) return '안수집사';
    if (raw.includes('전도사')) return '전도사';
    if (raw.includes('권사')) return '권사';
    if (raw.includes('집사')) return '집사';
    if (raw.includes('성도')) return '성도';
    return '기타';
  }

  function roleSortIndex(role) {
    const idx = ROLE_ORDER.indexOf(role);
    return idx === -1 ? ROLE_ORDER.length : idx;
  }

  function getRoleBadgeLabel(member) {
    const normalized = normalizeRole(member);
    return normalized === '기타' ? (member?.직분 || member?.세부직분 || '기타') : normalized;
  }

  function detectGroupType(value) {
    const label = normalizeText(value);
    if (!label) return '부서';
    if (label.endsWith('마을')) return '마을';
    if (label.includes('교구')) return '교구';
    return '부서';
  }


  function getVillageFilterValue(member) {
    const village = normalizeText(member?.교구);
    return village && village.endsWith('마을') ? village : '기타';
  }

  function formatDate(v) {
    const s = normalizeText(v);
    if (!s || s === '0' || s === 'NaT' || s === 'null' || s === 'undefined') return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (/^\d{4}[./]\d{2}[./]\d{2}$/.test(s)) return s.replace(/[.]/g, '-').replace(/\//g, '-');
    if (/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
    if (/^\d{6}$/.test(s)) return s;
    if (/^\d{5}$/.test(s)) {
      const excelEpoch = new Date(Date.UTC(1899, 11, 30));
      const date = new Date(excelEpoch.getTime() + Number(s) * 86400000);
      const yyyy = date.getUTCFullYear();
      const mm = String(date.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(date.getUTCDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }
    return s;
  }


  function getRegisterYear(member) {
    const date = formatDate(member?.등록일);
    if (!date) return '';
    const year = date.slice(0, 4);
    return /^\d{4}$/.test(year) ? year : '';
  }



  function getAgeGroup(member) {
    const age = Number(member?.나이 || 0);
    if (!Number.isFinite(age) || age <= 0) return '';
    const decade = Math.floor(age / 10) * 10;
    return `${decade}대`;
  }

  function getBirthDisplay(member) {
    if (!member || typeof member !== 'object') return '데이터 없음';

    const preferredKeys = [
      '생년월일', '생년월일8자리', '생년월일 8자리', '출생일', '생일',
      'Birth', 'birth', 'birthday', 'Birthday', 'DOB', 'dob'
    ];

    for (const key of preferredKeys) {
      const birth = formatDate(member[key]);
      if (birth) return birth;
    }

    const dynamicKey = Object.keys(member).find((key) => /생년|출생|생일|birth|birthday|dob/i.test(String(key)));
    if (dynamicKey) {
      const birth = formatDate(member[dynamicKey]);
      if (birth) return birth;
    }

    const nestedCandidates = [member.추가정보, member.상세정보, member.개인정보, member.profile, member.meta];
    for (const nested of nestedCandidates) {
      if (!nested || typeof nested !== 'object') continue;
      const nestedKey = Object.keys(nested).find((key) => /생년|출생|생일|birth|birthday|dob/i.test(String(key)));
      if (!nestedKey) continue;
      const birth = formatDate(nested[nestedKey]);
      if (birth) return birth;
    }

    return '데이터 없음';
  }

  function getJikClass(roleLabel) {
    const role = normalizeText(roleLabel);
    if (role.includes('장로')) return 'jik-장로';
    if (role.includes('목사')) return 'jik-목사';
    if (role.includes('사모')) return 'jik-사모';
    if (role.includes('안수집사')) return 'jik-안수집사';
    if (role.includes('전도사')) return 'jik-전도사';
    if (role.includes('권사')) return role.includes('명예') ? 'jik-명예권사' : 'jik-권사';
    if (role.includes('집사')) return 'jik-집사';
    if (role.includes('성도')) return 'jik-성도';
    return 'jik-other';
  }

  function getBadgeColor(label, type = 'default') {
    const normalized = normalizeText(label) || '미기재';
    const presetStatus = {
      '출석': '#7bce9a',
      '미출석': '#e3a87e',
      '장기결석': '#e87a5a',
      '새가족': '#7ec8e3',
      '등록': '#8aa0c8',
      '이명': '#c97ecb',
      '전출': '#a8b8d8'
    };
    if (type === 'status' && presetStatus[normalized]) return presetStatus[normalized];

    let hash = 0;
    const seed = `${type}:${normalized}`;
    for (let i = 0; i < seed.length; i += 1) {
      hash = ((hash << 5) - hash) + seed.charCodeAt(i);
      hash |= 0;
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue} 62% 68%)`;
  }

  function makeValueBadge(label, type = 'default', clickable = false, extraAttrs = '') {
    const safeLabel = normalizeText(label) || '-';
    const color = getBadgeColor(safeLabel, type);
    return `<span class="value-badge${clickable ? ' is-clickable' : ''}" style="--badge-color:${color};" ${extraAttrs}>${escapeHtml(safeLabel)}</span>`;
  }

  function isBadgeFilterActive(type, value) {
    const normalizedValue = normalizeText(value);
    if (!normalizedValue) return false;
    if (type === '직분') return normalizeText(state.filters.직분) === normalizeRole({ 직분: normalizedValue, 세부직분: normalizedValue });
    if (type === '성별') return state.filters.성별 === normalizedValue;
    if (type === '세례') return normalizeText(state.filters.세례) === normalizedValue;
    if (type === '현재상태') return normalizeText(state.filters.현재상태) === normalizedValue;
    if (type === '교구') return normalizeText(state.filters.교구) === normalizedValue;
    if (type === '구역') return normalizeText(state.filters.구역) === normalizedValue;
    if (type === '세부직분') return normalizeText(state.filters.세부직분) === normalizedValue;
    if (type === '등록년도') return state.filters.등록년도 === normalizedValue;
    return false;
  }

  function makeDetailFilterBadge(label, type = 'default', filterType = '', filterValue = '') {
    const safeLabel = normalizeText(label);
    const safeFilterValue = normalizeText(filterValue);
    const clickable = filterType && safeFilterValue;
    const active = clickable && isBadgeFilterActive(filterType, safeFilterValue);
    const attrs = clickable
      ? ` data-badge-filter-type="${escapeHtml(filterType)}" data-badge-filter-value="${escapeHtml(safeFilterValue)}"`
      : '';
    return makeValueBadge(safeLabel || '-', type, clickable, `${attrs}${active ? ' data-badge-active="true"' : ''} `).replace('value-badge', `value-badge${active ? ' is-active' : ''}`);
  }

  function renderDetailLookupField(label, displayValue, options = {}) {
    const safeLabel = normalizeText(label);
    const safeDisplayValue = normalizeText(displayValue);
    const filterType = options.filterType || '';
    const filterValue = normalizeText(options.filterValue ?? safeDisplayValue);
    const badgeType = options.badgeType || 'default';
    const isEmpty = !safeDisplayValue || safeDisplayValue === '0' || safeDisplayValue === 'NaT';
    if (isEmpty) return field(safeLabel, safeDisplayValue);
    if (!filterType || !filterValue) return field(safeLabel, safeDisplayValue);
    return fieldHtml(safeLabel, makeDetailFilterBadge(safeDisplayValue, badgeType, filterType, filterValue));
  }

  function renderFamilyInline(member) {
    const raw = normalizeText(member && member.가족전체);
    const selfName = normalizeText(member && member.이름);
    if (!raw) return '<span style="color:var(--text3)">-</span>';
    const parts = raw.split(/\s+/).filter(Boolean);
    return `<div class="family-inline-list">${parts.map(part => {
      const m = part.match(/^(.+?)(?:\((.+?)\))?$/);
      const name = normalizeText(m ? m[1] : part);
      const jik = normalizeText(m && m[2] ? m[2] : '');
      const linkedMember = findFamilyMemberByName(name, member.가족전체);
      const clickable = linkedMember && linkedMember.ID && name !== selfName;
      const attrs = clickable ? ` data-family-member-id="${escapeHtml(linkedMember.ID)}"` : '';
      return `<span class="family-inline-name${clickable ? ' is-link' : ''}"${attrs}>${escapeHtml(name)}${jik ? `<span class="family-inline-jik">(${escapeHtml(jik)})</span>` : ''}</span>`;
    }).join('')}</div>`;
  }

  function findFamilyMemberByName(name, familyText) {
    const targetName = normalizeText(name);
    const targetFamily = normalizeText(familyText);
    if (!targetName) return null;
    const candidates = state.members.filter(m => normalizeText(m.이름) === targetName);
    if (!candidates.length) return null;
    if (candidates.length === 1) return candidates[0];
    const sameFamily = candidates.find(m => normalizeText(m.가족전체) === targetFamily);
    if (sameFamily) return sameFamily;
    return candidates[0];
  }

  function parseFamilyMembers(member) {
    const raw = normalizeText(member && member.가족전체);
    if (!raw) return [];

    return raw.split(/\s+/).filter(Boolean).map(part => {
      const m = part.match(/^(.+?)(?:\((.+?)\))?$/);
      const name = normalizeText(m ? m[1] : part);
      const jik = normalizeText(m && m[2] ? m[2] : '');
      const linkedMember = findFamilyMemberByName(name, member.가족전체);
      const linkedRelation = normalizeText(linkedMember && linkedMember.관계);
      const selfRelation = normalizeText(member && member.관계);

      return {
        name,
        jik,
        linkedMember,
        relation: linkedRelation || (name === normalizeText(member.이름) ? selfRelation : ''),
        isSelf: name === normalizeText(member.이름),
        isSpouse: name === normalizeText(member.배우자),
        isHead: name === normalizeText(member.세대주)
      };
    });
  }

  function getFamilyRoleInfo(person, member) {
    const relation = normalizeText(person && person.relation);
    const selfName = normalizeText(member && member.이름);
    const spouseName = normalizeText(member && member.배우자);
    const headName = normalizeText(member && member.세대주) || selfName;
    const personName = normalizeText(person && person.name);

    if (personName && personName === headName) {
      return { label: '세대주', className: '세대주' };
    }

    if (person && person.isSelf) {
      return { label: '본인', className: '본인' };
    }

    if (person && person.isSpouse) {
      return { label: '배우자', className: '배우자' };
    }

    if (personName && spouseName && personName === spouseName) {
      return { label: '배우자', className: '배우자' };
    }

    if (/^(배우자|남편|아내|처|부인|사모님)$/.test(relation)) {
      return { label: '배우자', className: '배우자' };
    }

    if (/^(자녀|아들|딸|장남|장녀|차남|차녀|손자|손녀|손주)$/.test(relation)) {
      return { label: '자녀', className: '자녀' };
    }

    if (/^(부|모|부모|아버지|어머니|부친|모친|시아버지|시어머니|장인|장모)$/.test(relation)) {
      return { label: '부모', className: '부모' };
    }

    if (/^(형|누나|언니|오빠|형제|자매|형제자매)$/.test(relation)) {
      return { label: '가족', className: '가족' };
    }

    if (/^(본인)$/.test(relation) || personName === selfName) {
      return { label: '본인', className: '본인' };
    }

    return { label: '가족', className: '가족' };
  }

  function renderFamilyTreePerson(person, roleLabel, roleClass, options = {}) {
    if (!person || !person.name) return '';

    const variantClass = options.variantClass ? ` ${options.variantClass}` : '';
    const clickable = person.linkedMember && person.linkedMember.ID;
    const attrs = clickable ? ` data-family-member-id="${escapeHtml(person.linkedMember.ID)}"` : '';
    const jikText = normalizeText(person.jik || (person.linkedMember ? getRoleBadgeLabel(person.linkedMember) : ''));
    const relationText = normalizeText(person.relation);

    return `
      <div class="${options.wrapperClass || 'family-tree-node'}${variantClass}">
        <span class="family-role-badge family-role-${roleClass}">${escapeHtml(roleLabel)}</span>
        <span class="family-tree-name${clickable ? ' is-link' : ''}"${attrs}>${escapeHtml(person.name)}</span>
        ${jikText ? `<span class="family-tree-jik">${escapeHtml(jikText)}</span>` : ''}
        ${relationText && !['본인', '배우자', '세대주'].includes(roleLabel)
          ? `<span class="family-tree-jik">(${escapeHtml(relationText)})</span>`
          : ''}
      </div>
    `;
  }

  function renderFamilyTree(member) {
    const familyMembers = parseFamilyMembers(member);
    if (!familyMembers.length) {
      return `<div class="family-tree-empty">가족 정보 없음</div>`;
    }

    const selfName = normalizeText(member.이름);
    const spouseName = normalizeText(member.배우자);
    const headName = normalizeText(member.세대주) || selfName;

    const selfMember = familyMembers.find(item => item.name === selfName) || {
      name: selfName,
      jik: getRoleBadgeLabel(member),
      linkedMember: member,
      relation: normalizeText(member.관계),
      isSelf: true
    };

    const spouseMember = spouseName
      ? (familyMembers.find(item => item.name === spouseName) || {
          name: spouseName,
          jik: normalizeText(member.배우자직분),
          linkedMember: findFamilyMemberByName(spouseName, member.가족전체),
          relation: '배우자',
          isSpouse: true
        })
      : null;

    const headMember = familyMembers.find(item => item.name === headName) || {
      name: headName,
      jik: headName === selfName ? getRoleBadgeLabel(member) : '',
      linkedMember: findFamilyMemberByName(headName, member.가족전체),
      relation: '세대주',
      isHead: true
    };

    const usedNames = new Set();
    const childNodes = [];

    const addNode = (person) => {
      if (!person || !person.name || usedNames.has(person.name) || person.name === headMember.name) return;
      usedNames.add(person.name);
      const role = getFamilyRoleInfo(person, member);
      childNodes.push(renderFamilyTreePerson(person, role.label, role.className, { wrapperClass: 'family-tree-child-chip' }));
    };

    if (selfMember && selfMember.name !== headMember.name) addNode(selfMember);

    const parents = [];
    const children = [];
    const others = [];

    familyMembers.forEach(item => {
      if (!item.name) return;
      if (item.name === headMember.name) return;
      if (item.name === spouseName) return;
      if (item.name === selfName) return;
      const role = getFamilyRoleInfo(item, member);
      if (role.className === '부모') parents.push(item);
      else if (role.className === '자녀') children.push(item);
      else others.push(item);
    });

    parents.forEach(addNode);
    children.forEach(addNode);
    others.forEach(addNode);

    const headClickable = headMember.linkedMember && headMember.linkedMember.ID;
    const headAttrs = headClickable ? ` data-family-member-id="${escapeHtml(headMember.linkedMember.ID)}"` : '';
    const headJik = normalizeText(headMember.jik || (headMember.linkedMember ? getRoleBadgeLabel(headMember.linkedMember) : ''));

    return `
      <div class="family-tree">
        <div class="family-tree-rootline">
          <div class="family-tree-head">
            <span class="family-role-badge family-role-세대주">세대주</span>
            <span class="family-tree-name${headClickable ? ' is-link' : ''}"${headAttrs}>${escapeHtml(headMember.name || selfName || '-')}</span>
            ${headJik ? `<span class="family-tree-jik">${escapeHtml(headJik)}</span>` : ''}
          </div>
          ${spouseMember && spouseMember.name && spouseMember.name !== headMember.name
            ? renderFamilyTreePerson(spouseMember, '배우자', '배우자', { wrapperClass: 'family-tree-spouse-card' })
            : ''}
        </div>
        <div class="family-tree-children">
          ${childNodes.length ? `<div class="family-tree-children-list">${childNodes.join('')}</div>` : `<div class="family-tree-empty">가족 구성원 정보 없음</div>`}
        </div>
      </div>
    `;
  }


  function renderInlineMetaItem(label, valueHtml, extraClass = '') {
    const safeLabel = escapeHtml(normalizeText(label));
    return `<div class="inline-meta-item${extraClass ? ` ${extraClass}` : ''}"><span class="inline-meta-label">${safeLabel}</span><span class="inline-meta-value">${valueHtml}</span></div>`;
  }

  function renderPhoneLink(phone) {
    const raw = normalizeText(phone);
    if (!raw) return '<span class="inline-empty">-</span>';
    const tel = raw.replace(/[^\d+]/g, '');
    if (!tel) return escapeHtml(raw);
    return `<a href="tel:${escapeHtml(tel)}" class="inline-phone-link">${escapeHtml(raw)}</a>`;
  }

  function renderCompactInfoSection(title, items) {
    const content = items.filter(Boolean).join('');
    if (!content) return '';
    return `<div class="modal-section is-inline-compact"><div class="modal-section-title">${escapeHtml(title)}</div><div class="inline-meta-list">${content}</div></div>`;

  function field(label, value) {

    return `<div class="modal-field"><div class="modal-label">${label}</div><div class="modal-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '-' : escapeHtml(text)}</div></div>`;

    const notice = $('dataLoadNotice');

  function makeFilterBtn({label, count, type, value, isAll = false, active = false}) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-btn' + (active ? ' active' : '');
    btn.dataset.type = type;
    btn.dataset.value = value == null ? '' : String(value);
    btn.dataset.all = isAll ? 'true' : 'false';
    btn.innerHTML = `<span>${label}</span><span class="filter-count">${count.toLocaleString()}</span>`;
    return btn;
  }


  function getVisibleMembersForMenuCounts() {
    return Array.isArray(state.filtered) && state.filtered.length ? state.filtered : state.members;
  }

  function updateInlineAllButton(id, isActive, count) {
    const btn = $(id);
    if (!btn) return;
    btn.textContent = `전체 ${count.toLocaleString()}명`;
    btn.classList.toggle('active', isActive);
    btn.title = `전체 ${count.toLocaleString()}명`;
  }

  function updateGenderButtons() {
    const visible = getVisibleMembersForMenuCounts();
    const counts = new Map([['남', 0], ['여', 0]]);
    visible.forEach(member => {
      const gender = normalizeText(member.성별);
      if (counts.has(gender)) counts.set(gender, counts.get(gender) + 1);
    });
    const total = visible.length || 0;
    const maxCount = Math.max(0, ...counts.values());

    updateInlineAllButton('genderAllBtn', state.filters.성별 === '전체', total);

    document.querySelectorAll('.gender-row .gender-btn[data-gender]').forEach(btn => {
      const gender = btn.dataset.gender || '전체';
      const count = counts.get(gender) || 0;
      btn.innerHTML = `<span class="filter-btn-main">${gender}</span><span class="filter-btn-sub">${count.toLocaleString()}명</span>`;
      btn.classList.toggle('active', gender === state.filters.성별);
      btn.classList.toggle('is-top', count > 0 && count === maxCount);
      btn.title = `${gender} ${count.toLocaleString()}명`;
    });
  }

  function updateAgeButtons() {
    const groups = ['10대','20대','30대','40대','50대','60대','70대','80대','90대'];
    const visible = getVisibleMembersForMenuCounts();
    const counts = new Map(groups.map(group => [group, 0]));
    visible.forEach(member => {
      const group = getAgeGroup(member);
      if (counts.has(group)) counts.set(group, counts.get(group) + 1);
    });
    const total = visible.length || 0;
    const maxCount = Math.max(0, ...counts.values());

    updateInlineAllButton('ageAllBtn', state.filters.세대 === '전체', total);

    document.querySelectorAll('.age-row .age-btn[data-age-group]').forEach(btn => {
      const ageGroup = btn.dataset.ageGroup || '전체';
      const count = counts.get(ageGroup) || 0;
      btn.innerHTML = `<span class="filter-btn-main">${ageGroup}</span><span class="filter-btn-sub">${count.toLocaleString()}명</span>`;
      btn.classList.toggle('active', ageGroup === state.filters.세대);
      btn.classList.toggle('is-top', count > 0 && count === maxCount);
      btn.title = `${ageGroup} ${count.toLocaleString()}명`;
    });
  }

  function updateRegisterYearButtons() {
    const years = ['2020','2021','2022','2023','2024','2025'];
    const visible = getVisibleMembersForMenuCounts();
    const counts = new Map(years.map(year => [year, 0]));
    visible.forEach(member => {
      const year = getRegisterYear(member);
      if (counts.has(year)) counts.set(year, counts.get(year) + 1);
    });
    const total = visible.filter(member => years.includes(getRegisterYear(member))).length || 0;
    const maxCount = Math.max(0, ...counts.values());

    updateInlineAllButton('yearAllBtn', state.filters.등록년도 === '전체', total);

    document.querySelectorAll('#yearFilterRow .age-btn[data-register-year]').forEach(btn => {
      const year = btn.dataset.registerYear || '전체';
      const count = counts.get(year) || 0;
      btn.innerHTML = `<span class="filter-btn-main">${year}년</span><span class="filter-btn-sub">${count.toLocaleString()}명</span>`;
      btn.classList.toggle('active', year === state.filters.등록년도);
      btn.classList.toggle('is-top', count > 0 && count === maxCount);
      btn.title = `${year}년 ${count.toLocaleString()}명`;
    });
  }

  function buildFilters() {
    const villageCounts = new Map();
    const roleCounts = new Map();
    const statusCounts = new Map();

    state.members.forEach(member => {
      const village = getVillageFilterValue(member);
      villageCounts.set(village, (villageCounts.get(village) || 0) + 1);
      const role = normalizeRole(member);
      roleCounts.set(role, (roleCounts.get(role) || 0) + 1);

      const status = normalizeText(member.현재상태);
      if (status) statusCounts.set(status, (statusCounts.get(status) || 0) + 1);
    });

    const villages = [...villageCounts.entries()].sort((a, b) => {
      if (a[0] === '기타') return 1;
      if (b[0] === '기타') return -1;
      return a[0].localeCompare(b[0], 'ko');
    });
    const statuses = [...statusCounts.entries()].sort((a, b) => a[0].localeCompare(b[0], 'ko'));

    const visible = getVisibleMembersForMenuCounts();

    updateInlineAllButton('groupAllBtn', !state.filters.교구, visible.length || state.members.length);
    updateInlineAllButton('roleAllBtn', !state.filters.직분, visible.length || state.members.length);
    updateInlineAllButton('statusAllBtn', !state.filters.현재상태, visible.length || state.members.length);

    const groupList = $('교구FilterList');
    groupList.innerHTML = '';
    for (const [village, count] of villages) {
      groupList.appendChild(makeFilterBtn({
        label: village,
        count,
        type: '교구',
        value: village,
        active: normalizeText(state.filters.교구) === village
      }));
    }

    const roleList = $('직분FilterList');
    roleList.innerHTML = '';
    ROLE_ORDER.forEach(role => {
      const count = roleCounts.get(role);
      if (!count) return;
      roleList.appendChild(makeFilterBtn({
        label: role,
        count,
        type: '직분',
        value: role,
        active: normalizeText(state.filters.직분) === role
      }));
    });

    const statusList = $('상태FilterList');
    statusList.innerHTML = '';
    for (const [status, count] of statuses) {
      statusList.appendChild(makeFilterBtn({
        label: status,
        count,
        type: '현재상태',
        value: status,
        active: normalizeText(state.filters.현재상태) === status
      }));
    }

    updateGenderButtons();
    updateAgeButtons();
    updateRegisterYearButtons();
  }

  function applyFilters() {
    const q = state.searchQuery;
    state.filtered = state.members.filter(member => {
      const group = getVillageFilterValue(member);
      if (state.filters.교구 && group !== normalizeText(state.filters.교구)) return false;
      if (state.filters.직분 && normalizeRole(member) !== state.filters.직분) return false;
      if (state.filters.성별 !== '전체' && normalizeText(member.성별) !== state.filters.성별) return false;
      if (state.filters.세대 !== '전체' && getAgeGroup(member) !== state.filters.세대) return false;
      if (state.filters.등록년도 !== '전체' && getRegisterYear(member) !== state.filters.등록년도) return false;
      if (state.filters.현재상태 && normalizeText(member.현재상태) !== state.filters.현재상태) return false;
      if (state.filters.세례 && normalizeText(member.세례) !== state.filters.세례) return false;
      if (state.filters.구역 && normalizeText(member.구역) !== state.filters.구역) return false;
      if (state.filters.세부직분 && normalizeText(member.세부직분) !== state.filters.세부직분) return false;
      if (state.filters.이름) {
        const sameName = normalizeText(member.이름) === state.filters.이름;
        const sameFamily = state.filters.이름가족키 && getFamilySearchKey(member) === state.filters.이름가족키;
        if (!sameName && !sameFamily) return false;
      }
      if (q) {
        const haystackValues = [member.이름, member.가족전체, member.구역, member.교구, member.직분, member.세부직분, member.핸드폰, member.전화번호, getRegisterYear(member)];
        const hay = haystackValues.map(value => normalizeText(value).toLowerCase()).join(' ');
        const hayLoose = haystackValues.map(normalizeLooseSearch).join(' ');
        const qLoose = normalizeLooseSearch(q);
        if (!hay.includes(q) && (!qLoose || !hayLoose.includes(qLoose))) return false;
      }
      return true;
    });

    const dir = state.sortDir;
    const col = state.sortCol;
    state.filtered.sort((a, b) => {
      let av, bv;
      if (col === '직분') {
        av = roleSortIndex(normalizeRole(a));
        bv = roleSortIndex(normalizeRole(b));
        if (av !== bv) return (av - bv) * dir;
        av = normalizeText(a.이름);
        bv = normalizeText(b.이름);
      } else if (col === '나이') {
        av = Number(a[col] || 0);
        bv = Number(b[col] || 0);
      } else if (col === '등록일') {
        av = formatDate(a[col]);
        bv = formatDate(b[col]);
      } else {
        av = normalizeText(a[col]);
        bv = normalizeText(b[col]);
      }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return 0;
    });

    const totalPages = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
    if (state.currentPage > totalPages) state.currentPage = 1;
  }

  function getResultSummaryLabel() {
    const labels = [];
    if (state.filters.교구) labels.push(state.filters.교구);
    if (state.filters.직분) labels.push(state.filters.직분);
    if (state.filters.성별 !== '전체') labels.push(state.filters.성별 === '남' ? '남성' : '여성');
    if (state.filters.세대 !== '전체') labels.push(state.filters.세대);
    if (state.filters.등록년도 !== '전체') labels.push(`${state.filters.등록년도}년 등록`);
    if (state.filters.현재상태) labels.push(state.filters.현재상태);
    if (state.filters.세례) labels.push(state.filters.세례);
    if (state.filters.구역) labels.push(`구역: ${state.filters.구역}`);
    if (state.filters.세부직분) labels.push(`세부직분: ${state.filters.세부직분}`);
    if (state.filters.이름) labels.push(`성명+가족: ${state.filters.이름}`);
    if (state.searchQuery) labels.push(`검색: ${state.searchQuery}`);
    return labels.length ? labels.join(' · ') : '전체';
  }

  function renderActiveFilters() {
    const container = $('activeFilters');
    container.innerHTML = '';
    const tags = [];
    if (state.filters.교구) tags.push([state.filters.교구, () => { state.filters.교구 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.직분) tags.push([state.filters.직분, () => { state.filters.직분 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.성별 !== '전체') tags.push([state.filters.성별 + '성', () => { state.filters.성별 = '전체'; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.세대 !== '전체') tags.push([state.filters.세대, () => { state.filters.세대 = '전체'; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.등록년도 !== '전체') tags.push([`${state.filters.등록년도}년 등록`, () => { state.filters.등록년도 = '전체'; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.현재상태) tags.push([state.filters.현재상태, () => { state.filters.현재상태 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.세례) tags.push([state.filters.세례, () => { state.filters.세례 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.구역) tags.push([`구역: ${state.filters.구역}`, () => { state.filters.구역 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.세부직분) tags.push([`세부직분: ${state.filters.세부직분}`, () => { state.filters.세부직분 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.filters.이름) tags.push([`성명+가족: ${state.filters.이름}`, () => { state.filters.이름 = null; state.filters.이름가족키 = null; rerender({rebuildFilters:true, resetPage:true}); }]);
    if (state.searchQuery) tags.push([`"${state.searchQuery}"`, () => { state.searchQuery = ''; els.searchInput.value=''; rerender({resetPage:true}); }]);

    for (const [label, onRemove] of tags) {
      const tag = document.createElement('div');
      tag.className = 'filter-tag';
      tag.innerHTML = `<span>${label}</span><button type="button">×</button>`;
      tag.querySelector('button').addEventListener('click', onRemove);
      container.appendChild(tag);
    }
    const info = document.createElement('span');
    info.className = 'result-info';
    info.innerHTML = `<strong>${getResultSummaryLabel()}</strong> ${state.filtered.length.toLocaleString()}명`;
    container.appendChild(info);

function getChartData(type, members = state.filtered) {
    const counts = new Map();
    const source = Array.isArray(members) ? members : [];
    if (type === '교구') {
      source.forEach(member => {
        const value = getVillageFilterValue(member);
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => {
        if (a[0] === '기타') return 1;
        if (b[0] === '기타') return -1;
        return a[0].localeCompare(b[0], 'ko');
      });
    }
    if (type === '직분') {
      source.forEach(member => {
        const value = normalizeRole(member);
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => roleSortIndex(a[0]) - roleSortIndex(b[0]));
    }
    if (type === '성별') {
      source.forEach(member => {
        const value = normalizeText(member.성별) || '미기재';
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => b[1] - a[1]);
    }
    if (type === '세대') {
      source.forEach(member => {
        const value = getAgeGroup(member) || '미분류';
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => {
        const an = parseInt(a[0], 10);
        const bn = parseInt(b[0], 10);
        if (Number.isFinite(an) && Number.isFinite(bn)) return an - bn;
        return a[0].localeCompare(b[0], 'ko');
      });
    }
    if (type === '현재상태') {
      source.forEach(member => {
        const value = normalizeText(member.현재상태) || '미기재';
        counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => b[1] - a[1]);
    }
    if (type === '등록년도') {
      ['2020','2021','2022','2023','2024','2025'].forEach(year => counts.set(year, 0));
      source.forEach(member => {
        const value = getRegisterYear(member);
        if (counts.has(value)) counts.set(value, (counts.get(value) || 0) + 1);
      });
      return [...counts.entries()].filter(([, count]) => count > 0);
    }
    return [];
  }

  function getChartColor(index) {
    const palette = [
      '#c8a96e', '#e87a5a', '#7ec8e3', '#c97ecb', '#7bce9a',
      '#8aa0c8', '#e3a87e', '#e8a0b8', '#a8b8d8', '#f0c060',
      '#73c7b3', '#d98fbc'
    ];
    return palette[index % palette.length];
  }

  function buildPieChartSvg(data, total, chartType) {
    if (!data.length) {
      return '<div class="empty-state"><div class="icon">🥧</div><h3>표시할 데이터가 없습니다</h3></div>';
    }
    const cx = 110;
    const cy = 110;
    const radius = 84;
    const innerRadius = 48;
    let currentAngle = -Math.PI / 2;
    const paths = data.map(([label, count], index) => {
      const fraction = total ? count / total : 0;
      const angle = fraction * Math.PI * 2;
      const nextAngle = currentAngle + angle;
      const x1 = cx + radius * Math.cos(currentAngle);
      const y1 = cy + radius * Math.sin(currentAngle);
      const x2 = cx + radius * Math.cos(nextAngle);
      const y2 = cy + radius * Math.sin(nextAngle);
      const ix1 = cx + innerRadius * Math.cos(currentAngle);
      const iy1 = cy + innerRadius * Math.sin(currentAngle);
      const ix2 = cx + innerRadius * Math.cos(nextAngle);
      const iy2 = cy + innerRadius * Math.sin(nextAngle);
      const largeArc = angle > Math.PI ? 1 : 0;
      const encodedLabel = encodeURIComponent(label);
      const color = getChartColor(index);
      let d = '';
      if (angle >= Math.PI * 1.999) {
        d = [
          `M ${cx + radius} ${cy}`,
          `A ${radius} ${radius} 0 1 1 ${cx - radius} ${cy}`,
          `A ${radius} ${radius} 0 1 1 ${cx + radius} ${cy}`,
          `L ${cx + innerRadius} ${cy}`,
          `A ${innerRadius} ${innerRadius} 0 1 0 ${cx - innerRadius} ${cy}`,
          `A ${innerRadius} ${innerRadius} 0 1 0 ${cx + innerRadius} ${cy}`,
          'Z'
        ].join(' ');
      } else {
        d = [
          `M ${x1} ${y1}`,
          `A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`,
          `L ${ix2} ${iy2}`,
          `A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${ix1} ${iy1}`,
          'Z'
        ].join(' ');
      }
      currentAngle = nextAngle;
      return `<path class="chart-slice" d="${d}" fill="${color}" style="--slice-delay:${index * 65}ms" data-chart-select-type="${chartType}" data-chart-select-value="${encodedLabel}"><title>${label}: ${count}명 (${(fraction * 100).toFixed(1)}%)</title></path>`;
    }).join('');
    return `<div class="chart-pie-reveal"><svg class="chart-pie-svg" viewBox="0 0 220 220" role="img" aria-label="${chartType} 원형 그래프">${paths}<circle class="chart-pie-hole" cx="${cx}" cy="${cy}" r="${innerRadius - 4}"></circle><text class="chart-pie-center-text" x="${cx}" y="${cy - 4}">${total.toLocaleString()}명</text><text class="chart-pie-center-subtext" x="${cx}" y="${cy + 15}">현재 결과</text></svg></div>`;
  }

  function applyChartSelection(type, value) {
    const normalizedValue = normalizeText(value);
    if (!normalizedValue) return;
    state.view = 'table';
    state.chartType = null;
    if (type === '교구') state.filters.교구 = normalizedValue;
    else if (type === '직분') state.filters.직분 = normalizedValue;
    else if (type === '성별') state.filters.성별 = normalizedValue;
    else if (type === '세대') state.filters.세대 = normalizedValue;
    else if (type === '현재상태') state.filters.현재상태 = normalizedValue;
    else if (type === '등록년도') state.filters.등록년도 = normalizedValue;
    else return;
    closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
  }

  function sortChartData(data) {
    const list = Array.isArray(data) ? [...data] : [];
    if (state.chartSort === 'count_desc') {
      return list.sort((a, b) => (b[1] - a[1]) || a[0].localeCompare(b[0], 'ko'));
    }
    if (state.chartSort === 'count_asc') {
      return list.sort((a, b) => (a[1] - b[1]) || a[0].localeCompare(b[0], 'ko'));
    }
    return list.sort((a, b) => a[0].localeCompare(b[0], 'ko'));
  }

  function markChartSortButtons() {
    document.querySelectorAll('[data-chart-sort]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.chartSort === state.chartSort);
    });
  }

  function triggerChartDrillDown(type, value, triggerEl) {
    const panel = $('chartPanel');
    const target = triggerEl || panel;
    target.classList.add('is-drilling');
    panel.classList.add('is-drilling');
    window.setTimeout(() => {
      target.classList.remove('is-drilling');
      panel.classList.remove('is-drilling');
      applyChartSelection(type, value);
      const tableWrap = $('tableWrap');

  function animateChartEntrance() {
    const bars = $('chartBars');
    const pieWrap = $('chartPieWrap');
    if (!bars || !pieWrap) return;
    bars.classList.remove('chart-animate-ready');
    pieWrap.classList.remove('pie-animate-ready');
    void bars.offsetWidth;
    void pieWrap.offsetWidth;
    window.requestAnimationFrame(() => {
      bars.classList.add('chart-animate-ready');
      pieWrap.classList.add('pie-animate-ready');
    });
  }

  function renderChart() {
    const panel = $('chartPanel');
    const tableWrap = $('tableWrap');
    if (state.view !== 'chart' || !state.chartType) {
      panel.style.display = 'none';
      tableWrap.style.display = '';
      return;
    }
    const rawData = getChartData(state.chartType, state.filtered);
    const data = sortChartData(rawData);
    const total = data.reduce((sum, [, count]) => sum + count, 0);
    const maxCount = Math.max(...data.map(([, count]) => count), 1);
    const baseLabel = getResultSummaryLabel();
    $('chartTitle').textContent = `${state.chartType} 비율 그래프`;
    $('chartSubtitle').textContent = `${baseLabel} · ${total.toLocaleString()}명 기준`;
    $('chartHint').textContent = '막대 길이는 최대값 기준 상대 비교이며, 오른쪽 숫자는 실제 인원·비율입니다. 그래프 항목을 클릭하면 해당 성도 목록으로 이동합니다.';
    markChartSortButtons();

    if (!data.length) {
      $('chartBars').innerHTML = '<div class="empty-state"><div class="icon">📊</div><h3>표시할 데이터가 없습니다</h3><p>먼저 성도 명단을 불러오거나 필터를 조정해 주세요</p></div>';
      $('chartPieWrap').innerHTML = '<div class="empty-state"><div class="icon">🥧</div><h3>원형 그래프를 표시할 수 없습니다</h3></div>';
      $('chartLegend').innerHTML = '';
      panel.style.display = 'block';
      tableWrap.style.display = 'none';
      return;
    }

    $('chartBars').innerHTML = data.map(([label, count], index) => {
      const percent = total ? (count / total) * 100 : 0;
      const relativePercent = maxCount ? (count / maxCount) * 100 : 0;
      const encodedLabel = encodeURIComponent(label);
      const color = getChartColor(index);
      const isTop = count === maxCount;
      return `<div class="chart-row${isTop ? ' is-top' : ''}" style="--bar-delay:${index * 70}ms" data-chart-select-type="${state.chartType}" data-chart-select-value="${encodedLabel}">
        <div class="chart-label">${label}</div>
        <div class="chart-bar-track">
          <div class="chart-bar-fill" style="--target-width:${Math.max(relativePercent, 8)}%; --bar-delay:${index * 70}ms; background:linear-gradient(90deg, ${color} 0%, var(--accent2) 100%);">${percent.toFixed(1)}%</div>
        </div>
        <div class="chart-value">${count.toLocaleString()}명 · ${percent.toFixed(1)}%</div>
      </div>`;
    }).join('');

    $('chartPieWrap').innerHTML = buildPieChartSvg(rawData, total, state.chartType);
    $('chartLegend').innerHTML = data.map(([label, count], index) => {
      const percent = total ? (count / total) * 100 : 0;
      const encodedLabel = encodeURIComponent(label);
      const color = getChartColor(index);
      return `<div class="chart-legend-item" data-chart-select-type="${state.chartType}" data-chart-select-value="${encodedLabel}">
        <span class="chart-swatch" style="background:${color};"></span>
        <span class="chart-legend-label">${label}</span>
        <span class="chart-legend-value">${count.toLocaleString()}명 · ${percent.toFixed(1)}%</span>
      </div>`;
    }).join('');

    panel.style.display = 'block';
    tableWrap.style.display = 'none';
    animateChartEntrance();
  }

  function renderPagination() {
    const total = Math.ceil(state.filtered.length / PAGE_SIZE);
    const pg = els.pagination;
    if (total <= 1) { pg.innerHTML = ''; return; }
    let html = `<button type="button" class="page-btn" data-page="${state.currentPage - 1}" ${state.currentPage === 1 ? 'disabled' : ''}>‹</button>`;
    for (let i = 1; i <= total; i++) {
      if (total > 9 && i !== 1 && i !== total && Math.abs(i - state.currentPage) > 1) {
        if (i === 2 || i === total - 1 || i === state.currentPage - 2 || i === state.currentPage + 2) {
          html += '<span style="color:var(--text3);padding:0 4px">…</span>';
        }
        continue;
      }
      html += `<button type="button" class="page-btn ${i === state.currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }
    html += `<button type="button" class="page-btn" data-page="${state.currentPage + 1}" ${state.currentPage === total ? 'disabled' : ''}>›</button>`;
    pg.innerHTML = html;
  }
