    setMobileSidebar(false);
  }

  function resetToHome() {
    state.currentPage = 1;
    state.sortCol = '이름';
    state.sortDir = 1;
    state.searchQuery = '';
    state.view = 'table';
    state.chartType = null;
    state.chartSort = 'label_asc';
    state.filters = {
      교구: null,
      직분: null,
      성별: '전체',
      세대: '전체',
      현재상태: null,
      세례: null,
      구역: null,
      세부직분: null,
      등록년도: '전체',
      이름: null
    };
    if (els.searchInput) els.searchInput.value = '';
    closeModalDirect();
    closeMobileSidebar();
    rerender({ rebuildFilters: true, resetPage: true });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  const FONT_SCALE_STORAGE_KEY = 'churchDirectoryMobileFontScale';
  const ELDER_MODE_STORAGE_KEY = 'churchDirectoryMobileElderMode';
  const FONT_SCALE_MIN = 0.9;
  const FONT_SCALE_MAX = 1.5;
  const FONT_SCALE_STEP = 0.1;
  let currentFontScale = 1;
  let elderModeEnabled = false;
  const pinchState = {
    active: false,
    startDistance: 0,
    startScale: 1,
    rafId: 0,
    pendingScale: 1
  };

  function clampFontScale(value) {
    return Math.min(FONT_SCALE_MAX, Math.max(FONT_SCALE_MIN, Number(value) || 1));
  }

  function getTouchesDistance(touches) {
    if (!touches || touches.length < 2) return 0;
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  function updateFontControls() {
    const dec = $('fontDecreaseBtn');
    const inc = $('fontIncreaseBtn');
    if (dec) dec.disabled = currentFontScale <= FONT_SCALE_MIN + 0.001;
    if (inc) inc.disabled = currentFontScale >= FONT_SCALE_MAX - 0.001;
    const elderBtn = $('elderModeToggleBtn');
    if (elderBtn) {
      elderBtn.classList.toggle('active', elderModeEnabled);
      elderBtn.setAttribute('aria-pressed', elderModeEnabled ? 'true' : 'false');
      elderBtn.textContent = elderModeEnabled ? '기본글씨' : '큰글씨';
      elderBtn.title = elderModeEnabled ? '기본 글씨 크기로 돌아가기' : '고령자용 큰글씨 모드 켜기';
    }
  }

  function applyMobileFontScale(scale, { persist = true } = {}) {
    currentFontScale = clampFontScale(scale);
    document.documentElement.style.setProperty('--mobile-user-scale', String(currentFontScale));
    if (persist) {
      try {
        localStorage.setItem(FONT_SCALE_STORAGE_KEY, String(currentFontScale));
      } catch (e) {}
    }
    updateFontControls();
  }

  function setElderMode(enabled, { persist = true } = {}) {
    elderModeEnabled = !!enabled;
    document.body.classList.toggle('elder-mode', elderModeEnabled);
    if (elderModeEnabled && currentFontScale < Number(getComputedStyle(document.documentElement).getPropertyValue('--mobile-elder-scale').trim() || 1.25)) {
      applyMobileFontScale(Number(getComputedStyle(document.documentElement).getPropertyValue('--mobile-elder-scale').trim() || 1.25), { persist });
    } else {
      updateFontControls();
    }
    if (persist) {
      try {
        localStorage.setItem(ELDER_MODE_STORAGE_KEY, elderModeEnabled ? '1' : '0');
      } catch (e) {}
    }
  }

  function queuePinchScale(scale) {
    pinchState.pendingScale = clampFontScale(scale);
    if (pinchState.rafId) return;
    pinchState.rafId = requestAnimationFrame(() => {
      pinchState.rafId = 0;
      applyMobileFontScale(pinchState.pendingScale);
    });
  }

  function endPinchZoom() {
    pinchState.active = false;
    pinchState.startDistance = 0;
    pinchState.startScale = currentFontScale;
    if (pinchState.rafId) {
      cancelAnimationFrame(pinchState.rafId);
      pinchState.rafId = 0;
    }
    document.body.classList.remove('pinch-zooming');
  }

  function initPinchZoom() {
    document.addEventListener('touchstart', (e) => {
      if (window.innerWidth > 640) return;
      if (!e.touches || e.touches.length !== 2) return;
      pinchState.active = true;
      pinchState.startDistance = getTouchesDistance(e.touches);
      pinchState.startScale = currentFontScale;
      document.body.classList.add('pinch-zooming');
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (window.innerWidth > 640) return;
      if (!pinchState.active || !e.touches || e.touches.length !== 2) return;
      const distance = getTouchesDistance(e.touches);
      if (!distance || !pinchState.startDistance) return;
      const nextScale = pinchState.startScale * (distance / pinchState.startDistance);
      queuePinchScale(nextScale);
      if (typeof e.preventDefault === 'function') e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      if (!pinchState.active) return;
      if (e.touches && e.touches.length >= 2) return;
      endPinchZoom();
    }, { passive: true });

    document.addEventListener('touchcancel', () => {
      if (!pinchState.active) return;
      endPinchZoom();
    }, { passive: true });
  }

  function initFontControls() {
    let saved = 1;
    let elderSaved = false;
    try {
      saved = clampFontScale(localStorage.getItem(FONT_SCALE_STORAGE_KEY) || 1);
      elderSaved = localStorage.getItem(ELDER_MODE_STORAGE_KEY) === '1';
    } catch (e) {
      saved = 1;
      elderSaved = false;
    }
    applyMobileFontScale(saved, { persist: false });
    setElderMode(elderSaved, { persist: false });

    $('fontDecreaseBtn')?.addEventListener('click', () => {
      applyMobileFontScale(Math.round((currentFontScale - FONT_SCALE_STEP) * 10) / 10);
      if (elderModeEnabled && currentFontScale < 1.25) setElderMode(false);
    });
    $('fontIncreaseBtn')?.addEventListener('click', () => {
      applyMobileFontScale(Math.round((currentFontScale + FONT_SCALE_STEP) * 10) / 10);
    });
    $('elderModeToggleBtn')?.addEventListener('click', () => {
      if (elderModeEnabled) {
        setElderMode(false);
        applyMobileFontScale(1);
      } else {
        setElderMode(true);
      }
    });

    initPinchZoom();
  }

  function bindEvents() {
    $('homeResetBtn')?.addEventListener('click', resetToHome);
    $('mobileFilterOpenBtn')?.addEventListener('click', () => setMobileSidebar(true));
    $('mobileFilterCloseBtn')?.addEventListener('click', () => closeMobileSidebar());
    $('mobileSidebarBackdrop')?.addEventListener('click', () => closeMobileSidebar());
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMobileSidebar(); });

    els.searchInput.addEventListener('input', (e) => {
      state.searchQuery = normalizeText(e.target.value).toLowerCase();
      rerender({ resetPage: true });
    });

    $('groupAllBtn').addEventListener('click', () => {
      state.filters.교구 = null;
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('교구FilterList').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      const value = normalizeText(btn.dataset.value);
      state.filters.교구 = value;
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('roleAllBtn').addEventListener('click', () => {
      state.filters.직분 = null;
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('직분FilterList').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      state.filters.직분 = normalizeText(btn.dataset.value);
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('statusAllBtn').addEventListener('click', () => {
      state.filters.현재상태 = null;
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('상태FilterList').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      state.filters.현재상태 = normalizeText(btn.dataset.value);
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('genderFilterRow').addEventListener('click', (e) => {
      const btn = e.target.closest('.gender-btn[data-gender]');
      if (!btn) return;
      state.filters.성별 = btn.dataset.gender || '전체';
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('genderAllBtn').addEventListener('click', () => {
      state.filters.성별 = '전체';
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('ageFilterRow').addEventListener('click', (e) => {
      const btn = e.target.closest('.age-btn[data-age-group]');
      if (!btn) return;
      state.filters.세대 = btn.dataset.ageGroup || '전체';
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('ageAllBtn').addEventListener('click', () => {
      state.filters.세대 = '전체';
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('yearFilterRow').addEventListener('click', (e) => {
      const btn = e.target.closest('.age-btn[data-register-year]');
      if (!btn) return;
      state.filters.등록년도 = btn.dataset.registerYear || '전체';
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    $('yearAllBtn').addEventListener('click', () => {
      state.filters.등록년도 = '전체';
      closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
    });

    document.querySelectorAll('.chart-toggle[data-chart]').forEach(el => {
      el.addEventListener('click', () => {
        showChart(el.dataset.chart);
      });
    });

    $('chartBackBtn').addEventListener('click', () => {
      showTableView();
    });

    $('chartPanel').addEventListener('click', (e) => {
      const sortBtn = e.target.closest('[data-chart-sort]');
      if (sortBtn) {
        state.chartSort = sortBtn.dataset.chartSort || 'label_asc';
        renderChart();
        return;
      }
      const target = e.target.closest('[data-chart-select-type]');
      if (!target) return;
      const type = target.dataset.chartSelectType;
      const value = decodeURIComponent(target.dataset.chartSelectValue || '');
      triggerChartDrillDown(type, value, target);
    });

    document.querySelector('thead').addEventListener('click', (e) => {
      const th = e.target.closest('th[data-sort]');
      if (!th) return;
      const col = th.dataset.sort;
      if (state.sortCol === col) state.sortDir *= -1;
      else { state.sortCol = col; state.sortDir = 1; }
      rerender();
    });

    els.tableBody.addEventListener('click', (e) => {
      const familyLink = e.target.closest('[data-family-member-id]');
      if (familyLink) {
        e.stopPropagation();
        showDetail(familyLink.dataset.familyMemberId);
        return;
      }
      const row = e.target.closest('tr[data-member-id]');
      if (row) showDetail(row.dataset.memberId);
    });

    els.pagination.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-page]');
      if (!btn || btn.disabled) return;
      const total = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
      const next = Number(btn.dataset.page || 1);
      if (next < 1 || next > total) return;
      state.currentPage = next;
      renderTable();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    $('modalMeta').addEventListener('click', (e) => {
      const badge = e.target.closest('[data-badge-filter-type]');
      if (!badge) return;
      applyBadgeFilter(badge.dataset.badgeFilterType, badge.dataset.badgeFilterValue);
    });
    $('modalName').addEventListener('click', (e) => {
      const target = e.target.closest('[data-name-filter], [data-name-filter-id]');
      if (!target) return;
      applyNameFilter(target.dataset.nameFilterId || target.dataset.nameFilter);
    });
    $('modalSubinfo').addEventListener('click', (e) => {
      const memberBtn = e.target.closest('[data-member-id]');
      if (!memberBtn || memberBtn.disabled) return;
      showDetail(memberBtn.dataset.memberId);
    });
    $('modalBody').addEventListener('click', (e) => {
      const badge = e.target.closest('[data-badge-filter-type]');
      if (badge) {
        applyBadgeFilter(badge.dataset.badgeFilterType, badge.dataset.badgeFilterValue);
        return;
      }
      const nameFilter = e.target.closest('[data-name-filter]');
      if (nameFilter) {
        applyNameFilter(nameFilter.dataset.nameFilter);
        return;
      }
      const familyTag = e.target.closest('[data-family-member-id]');
      if (!familyTag) return;
      showDetail(familyTag.dataset.familyMemberId);
    });


    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { if (window.innerWidth > 640) closeMobileSidebar(); rerender(); }, 80);
    });
  }

  function buildJsonPickerNotice(message) {
    return `
      <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;">
        <div>${message}</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <label for="jsonFileInput" style="display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid rgba(200,169,110,0.35); border-radius:8px; background:rgba(200,169,110,0.12); color:var(--accent2); cursor:pointer; font-weight:500;">
            JSON 파일 선택
          </label>
          <input id="jsonFileInput" type="file" accept=".json,application/json" style="display:none;" />
        </div>
      </div>
    `;
  }

  function finalizeLoadedData(data) {
    if (!Array.isArray(data)) throw new Error('JSON 형식 오류');
    state.members = data;
    hideNotice();
    buildFilters();
    closeMobileSidebar();
      rerender({ rebuildFilters: true, resetPage: true });
  }

  async function loadDataFromSelectedFile(file) {
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      finalizeLoadedData(data);
    } catch (err) {
      showNotice(buildJsonPickerNotice('선택한 JSON 파일을 읽지 못했습니다.<br><strong>church_members.json</strong> 형식인지 확인해 주세요.'), true);
      const input = $('jsonFileInput');
      if (input) input.addEventListener('change', (e) => loadDataFromSelectedFile(e.target.files?.[0]), { once: true });
    }
  }

  function promptJsonSelection(message) {
    const noticeMessage = message || '자동 불러오기에 실패했습니다. <strong>church_members.json</strong> 파일을 직접 선택해 주세요.';
    showNotice(buildJsonPickerNotice(noticeMessage), true);
    const input = $('jsonFileInput');
    if (input) {
      input.value = '';
      input.addEventListener('change', (e) => loadDataFromSelectedFile(e.target.files?.[0]), { once: true });
    }
  }

  async function loadDefaultJson() {
    showNotice('명단 데이터를 불러오는 중입니다...');
    try {
      const response = await fetch('./church_members.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      const data = await response.json();
      finalizeLoadedData(data);
    } catch (error) {
      //console.error('church_members.json 자동 불러오기 실패:', error);
      //promptJsonSelection('자동으로 <strong>church_members.json</strong> 파일을 불러오지 못했습니다.<br>GitHub Pages에 올릴 때는 HTML 파일과 JSON 파일을 같은 폴더에 함께 업로드해 주세요.');
    }
  }

  function init() {
    els.searchInput = $('searchInput');
    els.tableBody = $('tableBody');
    els.pagination = $('pagination');
    bindEvents();
    initFontControls();
    loadDefaultJson();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
